<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能做题系统</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#10b981',
            neutral: '#64748b',
            light: '#f1f5f9',
            dark: '#1e293b',
            warning: '#f59e0b',
            danger: '#ef4444'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .card-shadow {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .btn-hover {
        @apply transition-all duration-300 transform hover:scale-105 hover:shadow-lg;
      }
      .input-focus {
        @apply focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none;
      }
      .question-image {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        margin: 0.5rem 0;
      }
      .material-content img, .question-content img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        margin: 0.5rem 0;
        display: block;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-light to-gray-200 min-h-screen font-sans text-dark">
  <div class="container max-w-2xl mx-auto px-4 py-8">
    <!-- 配置界面：浏览并选择题库 -->
    <div id="config-page" class="bg-white rounded-xl p-6 card-shadow">
      <div class="text-center mb-6">
        <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-primary mb-2">做题配置</h1>
        <p class="text-neutral" id="config-subtitle">从学习助手题库中选择题目开始练习</p>
      </div>
      
      <!-- 筛选栏 -->
      <div class="flex flex-wrap gap-3 mb-4">
        <select id="filter-grade" class="flex-1 min-w-[120px] px-3 py-2 border border-gray-300 rounded-lg text-sm input-focus">
          <option value="">选择年级</option>
        </select>
        <select id="filter-subject" class="flex-1 min-w-[120px] px-3 py-2 border border-gray-300 rounded-lg text-sm input-focus">
          <option value="all">全部科目</option>
        </select>
        <select id="filter-type" class="flex-1 min-w-[100px] px-3 py-2 border border-gray-300 rounded-lg text-sm input-focus">
          <option value="all">全部题型</option>
          <option value="choice">选择题</option>
          <option value="fill">填空题</option>
          <option value="other">问答题</option>
        </select>
      </div>

      <!-- 操作按钮和统计 -->
      <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
        <div class="flex gap-2">
          <button id="select-all-btn" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition-colors cursor-pointer">
            <i class="fa fa-check-square-o mr-1"></i>全选
          </button>
          <button id="deselect-all-btn" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition-colors cursor-pointer">
            <i class="fa fa-square-o mr-1"></i>取消全选
          </button>
          <button id="random-select-btn" class="px-3 py-1.5 bg-warning/10 text-warning rounded-lg text-sm hover:bg-warning/20 transition-colors cursor-pointer">
            <i class="fa fa-random mr-1"></i>随机选
          </button>
        </div>
        <span class="text-sm text-gray-500">
          已选 <b id="selected-count" class="text-primary">0</b> / <span id="total-count">0</span> 题
        </span>
      </div>

      <!-- 题目列表 -->
      <div id="question-browser" class="max-h-[400px] overflow-y-auto border border-gray-200 rounded-lg divide-y divide-gray-100 mb-4">
        <div id="question-browser-empty" class="text-center py-12 text-gray-500">
          <i class="fa fa-inbox text-4xl mb-3 block"></i>
          <span id="empty-message">正在加载题库数据...</span>
        </div>
      </div>

      <div class="flex flex-wrap gap-3">
        <button id="start-btn" class="flex-1 bg-primary text-white font-medium py-2.5 px-4 rounded-lg btn-hover">
          <i class="fa fa-play mr-2"></i>开始做题
        </button>
        <button id="history-btn" class="flex-1 bg-neutral text-white font-medium py-2.5 px-4 rounded-lg btn-hover">
          <i class="fa fa-history mr-2"></i>历史记录
        </button>
      </div>
    </div>

    <!-- 做题界面 -->
    <div id="question-page" class="bg-white rounded-xl p-6 card-shadow" style="display: none;">
      <div id="header" class="flex justify-between items-center mb-6 pb-3 border-b border-gray-200">
        <div class="flex items-center text-neutral">
          <i class="fa fa-clock-o mr-2"></i>
          <span id="timer" class="font-medium">00:00</span>
        </div>
        <div class="flex items-center text-neutral">
          <i class="fa fa-progress mr-2"></i>
          <span id="progress" class="font-medium">0/0</span>
        </div>
        <div class="flex items-center px-3 py-1 bg-primary/10 text-primary rounded-full text-sm font-medium">
          <i class="fa fa-bookmark-o mr-1"></i>
          <span id="current-subject"></span>
        </div>
      </div>
      
      <div id="question-container" class="min-h-[300px] mb-6"></div>
      
      <div class="flex justify-between">
        <button id="exit-btn" class="bg-danger text-white font-medium py-2 px-4 rounded-lg btn-hover">
          <i class="fa fa-sign-out mr-1"></i>退出答题
        </button>
        <button id="prev-btn" class="bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg btn-hover" style="display: none;">
          <i class="fa fa-arrow-left mr-1"></i>上一题
        </button>
        <button id="next-btn" class="bg-primary text-white font-medium py-2 px-4 rounded-lg btn-hover">
          下一题<i class="fa fa-arrow-right ml-1"></i>
        </button>
        <button id="submit-btn" class="bg-secondary text-white font-medium py-2 px-4 rounded-lg btn-hover" style="display: none;">
          <i class="fa fa-check mr-1"></i>提交答案
        </button>
      </div>
    </div>
  </div>

  <!-- 结果弹窗 -->
  <div id="result-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 card-shadow">
      <h2 class="text-xl font-bold text-center text-primary mb-4">做题结果</h2>
      <div id="result-content" class="max-h-[400px] overflow-y-auto mb-5 text-sm space-y-2"></div>
      <div class="flex gap-3">
        <button id="back-btn" class="flex-1 bg-neutral text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-home mr-1"></i>返回首页
        </button>
        <button id="export-result-btn" class="flex-1 bg-primary text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-download mr-1"></i>导出结果
        </button>
      </div>
    </div>
  </div>

  <!-- 历史记录弹窗 -->
  <div id="history-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 card-shadow max-h-[80vh] flex flex-col">
      <h2 class="text-xl font-bold text-center text-primary mb-4">历史记录</h2>
      <div id="history-list" class="flex-1 overflow-y-auto mb-4 space-y-3"></div>
      <div class="flex gap-3">
        <button id="clear-all-history-btn" class="flex-1 bg-danger text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-trash mr-1"></i>清空记录
        </button>
        <button id="close-history-btn" class="flex-1 bg-neutral text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-times mr-1"></i>关闭
        </button>
        <button id="export-all-history-btn" class="flex-1 bg-primary text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-download mr-1"></i>导出全部
        </button>
      </div>
    </div>
  </div>

  <script>
    // ========== 数据加载：从学习助手的 localStorage 读取题库 ==========
    let bankQuestions = [];
    let bankSubjects = [];
    let bankKnowledgePoints = [];
    let bankPapers = [];
    let bankGrades = [];
    let bankSelectedIds = new Set();
    let currentGradeId = '';

    function loadBankData(gradeId) {
      bankQuestions = []; bankSubjects = []; bankKnowledgePoints = []; bankPapers = []; bankGrades = [];
      try { bankGrades = JSON.parse(localStorage.getItem('grades') || '[]'); } catch(e) {}
      currentGradeId = gradeId || localStorage.getItem('currentGradeId') || '';
      if (!currentGradeId && bankGrades.length > 0) currentGradeId = bankGrades[0].id;
      if (currentGradeId) {
        try {
          const raw = localStorage.getItem('data_' + currentGradeId);
          if (raw) {
            const data = JSON.parse(raw);
            bankQuestions = data.questions || [];
            bankSubjects = data.subjects || [];
            bankKnowledgePoints = data.knowledgePoints || [];
            bankPapers = data.papers || [];
          }
        } catch(e) { console.error('加载题库数据失败:', e); }
      }
    }

    function convertQuestion(q, idx) {
      const typeMap = { choice: '选择题', fill: '填空题' };
      const internalType = typeMap[q.type] || '材料题';
      const question = { '题型': internalType, '题目': q.content || '', 'csvType': internalType, 'originalLineIndex': idx,
        '_sourceId': q.id || '', '_subjectId': q.subjectId || '', '_knowledgePoint': q.knowledgePoint || '',
        '_difficulty': q.difficulty || '', '_source': q.source || '',
        '_subjectName': (bankSubjects.find(s => s.id === q.subjectId) || {}).name || '' };
      const photoMarkdown = (q.photos || []).filter(p => p).map(p => '![]('+p+')').join('\n');
      if (photoMarkdown) question['题目'] = photoMarkdown + '\n' + question['题目'];
      if (internalType === '选择题') {
        question['答案'] = q.answer || ''; question['displayAnswer'] = q.answer;
        const opts = (q.options || []).filter(o => o.label && ['A','B','C','D'].includes(o.label.toUpperCase()));
        opts.forEach(o => { question[o.label.toUpperCase()] = o.text || ''; });
        question['shuffledOptions'] = opts.map(o => ({ key: o.label.toUpperCase(), value: o.text || '' }));
        question['originalAnswer'] = q.answer;
      } else if (internalType === '填空题') {
        question['答案1'] = q.answer || '';
      } else {
        question['答案'] = q.answer || '';
        question['材料内容'] = q.content || '';
      }
      return question;
    }

    // ========== 全局状态 ==========
    let questions = [];
    let userAnswers = [];
    let currentQuestionIndex = 0;
    let timerInterval;
    let secondsElapsed = 0;
    let currentSubjectLabel = '';

    // ========== 工具函数 ==========
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; }
      return newArray;
    }

    function getRandomOptions(question) {
      const options = [];
      ['A','B','C','D'].forEach(key => { if (question[key]) options.push({key, value:question[key]}); });
      const shuffledOptions = shuffleArray(options);
      let newCorrectAnswer = '';
      shuffledOptions.forEach((opt, idx) => { if (opt.key === question['答案']) newCorrectAnswer = String.fromCharCode(65+idx); });
      return { options: shuffledOptions, newCorrectAnswer };
    }

    function textToHtml(text) {
      if (!text) return '';
      let result = text.trim();
      result = result.replace(/!\[.*?\]\((https?:\/\/[^\s]+)\)/gi, (m,u) => '<img src="'+u+'" class="question-image" alt="图片">');
      result = result.replace(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|bmp|webp|svg))/gi, (u) => '<img src="'+u+'" class="question-image" alt="图片">');
      result = result.replace(/\$\$([\s\S]*?)\$\$/g, (m,f) => '\\['+f+'\\]');
      result = result.replace(/\$([^$]+?)\$/g, (m,f) => '\\('+f+'\\)');
      return result;
    }

    function renderMath(element) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(element, { delimiters: [{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}], throwOnError:false, output:'html' });
      }
    }

    function escapeCsvField(field) {
      if (!field) return '';
      if (field.includes(',') || field.includes('"') || field.includes('\n')) return '"'+field.replace(/"/g,'""')+'"';
      return field;
    }

    function buildUserAnswerStr(question, index, answersArr) {
      const answers = answersArr || userAnswers;
      const ua = answers[index] || {};
      if (question['题型'] === '选择题') return ua[1] || '未作答';
      const parts = [];
      for (let i = 1; i <= 10; i++) { if (ua[i]) parts.push(i+':'+ua[i]); }
      return parts.join('; ') || '未作答';
    }

    function buildCorrectnessStr(question, index, answersArr) {
      const answers = answersArr || userAnswers;
      const ua = answers[index] || {};
      if (question['题型'] === '选择题') return ua[1] === question['displayAnswer'] ? '正确' : '错误';
      return '未判断';
    }

    function getCorrectAnswerStr(question) {
      if (question['题型'] === '选择题') return question['displayAnswer'] || question['答案'] || '';
      const parts = [];
      for (let i = 1; i <= 10; i++) { if (question['答案'+i]) parts.push(i+':'+question['答案'+i]); }
      return parts.join('; ') || question['答案'] || '';
    }

    // ========== DOM 元素 ==========
    const configPage = document.getElementById('config-page');
    const questionPage = document.getElementById('question-page');
    const startBtn = document.getElementById('start-btn');
    const historyBtn = document.getElementById('history-btn');
    const timerSpan = document.getElementById('timer');
    const progressSpan = document.getElementById('progress');
    const currentSubjectSpan = document.getElementById('current-subject');
    const questionContainer = document.getElementById('question-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    const exitBtn = document.getElementById('exit-btn');
    const resultModal = document.getElementById('result-modal');
    const resultContent = document.getElementById('result-content');
    const backBtn = document.getElementById('back-btn');
    const exportResultBtn = document.getElementById('export-result-btn');
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const closeHistoryBtn = document.getElementById('close-history-btn');
    const exportAllHistoryBtn = document.getElementById('export-all-history-btn');
    const clearAllHistoryBtn = document.getElementById('clear-all-history-btn');
    const historyKey = 'problem_history';

    // ========== 配置界面：题库浏览器 ==========
    function initFilterUI() {
      const gradeSelect = document.getElementById('filter-grade');
      gradeSelect.innerHTML = '<option value="">选择年级</option>';
      bankGrades.forEach(g => {
        gradeSelect.innerHTML += '<option value="'+g.id+'"'+(g.id===currentGradeId?' selected':'')+'>'+g.name+'</option>';
      });
      gradeSelect.onchange = function() { loadBankData(this.value); renderQuestionBrowser(); };

      const subjSelect = document.getElementById('filter-subject');
      subjSelect.innerHTML = '<option value="all">全部科目</option>';
      bankSubjects.forEach(s => { subjSelect.innerHTML += '<option value="'+s.id+'">'+s.name+'</option>'; });
      subjSelect.onchange = renderQuestionBrowser;
      document.getElementById('filter-type').onchange = renderQuestionBrowser;
    }

    function getFilteredQuestions() {
      const subjId = document.getElementById('filter-subject').value;
      const typeF = document.getElementById('filter-type').value;
      let filtered = [...bankQuestions];
      if (subjId !== 'all') filtered = filtered.filter(q => q.subjectId === subjId);
      if (typeF !== 'all') filtered = filtered.filter(q => q.type === typeF);
      return filtered;
    }

    function renderQuestionBrowser() {
      const filtered = getFilteredQuestions();
      const browser = document.getElementById('question-browser');
      const emptyEl = document.getElementById('question-browser-empty');
      document.getElementById('total-count').textContent = filtered.length;
      updateSelectedCount();
      const existing = browser.querySelectorAll('.question-browser-item');
      existing.forEach(el => el.remove());
      if (filtered.length === 0) {
        emptyEl.style.display = '';
        document.getElementById('empty-message').textContent = bankQuestions.length===0 ? '题库为空，请先在「学习助手」中添加题目' : '没有匹配的题目';
        return;
      }
      emptyEl.style.display = 'none';
      filtered.forEach(q => {
        const subj = bankSubjects.find(s => s.id === q.subjectId);
        const typeLabel = {choice:'选择题',fill:'填空题',other:'问答题'}[q.type]||q.type;
        const typeColor = {choice:'bg-blue-100 text-blue-700',fill:'bg-orange-100 text-orange-700',other:'bg-purple-100 text-purple-700'}[q.type]||'bg-gray-100 text-gray-700';
        const preview = (q.content||'无内容').replace(/<[^>]+>/g,'').substring(0,60);
        const item = document.createElement('div');
        item.className = 'question-browser-item flex items-start gap-3 p-3 hover:bg-gray-50 transition-colors cursor-pointer';
        item.innerHTML = '<input type="checkbox" class="question-checkbox mt-0.5 w-4 h-4 text-primary rounded" data-id="'+q.id+'"'+(bankSelectedIds.has(q.id)?' checked':'')+'>'+
          '<div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-0.5"><span class="px-1.5 py-0.5 '+typeColor+' text-xs rounded">'+typeLabel+'</span>'+
          (subj?'<span class="text-xs text-gray-400">'+subj.name+'</span>':'')+
          '</div><div class="text-sm text-gray-700 truncate">'+preview+'</div></div>';
        const cb = item.querySelector('.question-checkbox');
        cb.onchange = function() { if (this.checked) bankSelectedIds.add(q.id); else bankSelectedIds.delete(q.id); updateSelectedCount(); };
        item.onclick = function(e) { if (e.target.tagName!=='INPUT') { cb.checked = !cb.checked; cb.onchange(); } };
        browser.appendChild(item);
      });
    }

    function updateSelectedCount() {
      const filtered = getFilteredQuestions();
      const selInView = filtered.filter(q => bankSelectedIds.has(q.id)).length;
      document.getElementById('selected-count').textContent = selInView;
    }

    // ========== 事件监听 ==========
    function initEventListeners() {
      startBtn.addEventListener('click', startQuizSetup);
      historyBtn.addEventListener('click', showHistory);
      prevBtn.addEventListener('click', goToPrevQuestion);
      nextBtn.addEventListener('click', goToNextQuestion);
      submitBtn.addEventListener('click', confirmSubmit);
      exitBtn.addEventListener('click', confirmExit);
      backBtn.addEventListener('click', returnToConfig);
      exportResultBtn.addEventListener('click', exportCurrentResult);
      closeHistoryBtn.addEventListener('click', () => { historyModal.style.display = 'none'; });
      exportAllHistoryBtn.addEventListener('click', exportAllHistory);
      clearAllHistoryBtn.addEventListener('click', confirmClearAllHistory);
    }

    // 全选/取消全选/随机选
    function initQuickButtons() {
      document.getElementById('select-all-btn').onclick = function() {
        getFilteredQuestions().forEach(q => bankSelectedIds.add(q.id));
        renderQuestionBrowser();
      };
      document.getElementById('deselect-all-btn').onclick = function() {
        getFilteredQuestions().forEach(q => bankSelectedIds.delete(q.id));
        renderQuestionBrowser();
      };
      document.getElementById('random-select-btn').onclick = function() {
        const filtered = getFilteredQuestions();
        const n = parseInt(prompt('随机选择几道题？', String(Math.min(10, filtered.length))));
        if (!n || n <= 0) return;
        bankSelectedIds = new Set();
        const shuffled = shuffleArray(filtered).slice(0, Math.min(n, filtered.length));
        shuffled.forEach(q => bankSelectedIds.add(q.id));
        renderQuestionBrowser();
      };
    }

    // ========== 开始做题 ==========
    function startQuizSetup() {
      const filtered = getFilteredQuestions();
      const selected = filtered.filter(q => bankSelectedIds.has(q.id));
      if (selected.length === 0) { alert('请先选择题库中的题目'); return; }
      questions = selected.map((q, idx) => convertQuestion(q, idx));
      questions.forEach(question => {
        if (question['题型'] === '选择题') { const r = getRandomOptions(question); question['shuffledOptions'] = r.options; question['displayAnswer'] = r.newCorrectAnswer; }
      });
      questions = shuffleArray(questions);
      userAnswers = new Array(questions.length).fill().map(() => ({}));
      currentQuestionIndex = 0; secondsElapsed = 0;
      currentSubjectLabel = document.getElementById('filter-subject').selectedOptions[0]?.textContent || '学习助手';
      startQuiz();
    }

    function startQuiz() {
      configPage.style.display = 'none';
      questionPage.style.display = 'block';
      currentSubjectSpan.textContent = currentSubjectLabel || '学习助手';
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      showQuestion();
      updateNavigationButtons();
    }

    // ========== 计时器 ==========
    function updateTimer() {
      secondsElapsed++;
      const m = Math.floor(secondsElapsed/60).toString().padStart(2,'0');
      const s = (secondsElapsed%60).toString().padStart(2,'0');
      timerSpan.textContent = m+':'+s;
      if (secondsElapsed > 600) timerSpan.classList.add('text-warning','font-bold');
      else timerSpan.classList.remove('text-warning','font-bold');
    }

    // ========== 显示题目 ==========
    function showQuestion() {
      if (currentQuestionIndex >= questions.length) return;
      const question = questions[currentQuestionIndex];
      progressSpan.textContent = (currentQuestionIndex+1)+'/'+questions.length;
      questionContainer.innerHTML = '';
      const typeBadge = document.createElement('span');
      typeBadge.className = 'inline-block px-2 py-0.5 bg-gray-100 text-gray-800 text-xs font-medium rounded mb-3';
      typeBadge.textContent = question['题型'];
      questionContainer.appendChild(typeBadge);

      if (question['题型'] === '材料题') {
        if (question['材料内容']) {
          const mc = document.createElement('div');
          mc.className = 'text-base font-medium mb-4 p-4 bg-gray-50 rounded-lg border-l-4 border-primary';
          mc.innerHTML = '<strong>材料：</strong><div class="material-content mt-2">'+textToHtml(question['材料内容'])+'</div>';
          questionContainer.appendChild(mc);
        }
        if (question['问题']) {
          const qd = document.createElement('div');
          qd.className = 'mb-4 p-3 bg-gray-50 rounded-lg';
          qd.innerHTML = '<div class="font-medium text-gray-700 mb-2">问题：</div><div class="question-content text-base">'+textToHtml(question['问题'])+'</div>';
          questionContainer.appendChild(qd);
          const ic = document.createElement('div'); ic.className = 'mb-6';
          const input = document.createElement('textarea');
          input.className = 'w-full p-3 border border-gray-300 rounded-lg input-focus min-h-[100px] resize-y';
          input.placeholder = '请输入答案';
          input.value = userAnswers[currentQuestionIndex][1] || '';
          input.oninput = function(e) { userAnswers[currentQuestionIndex][1] = e.target.value; };
          ic.appendChild(input); questionContainer.appendChild(ic);
        } else {
          for (let i = 1; i <= 10; i++) {
            const pk = '问题'+i; if (!question[pk]) continue;
            const qd = document.createElement('div');
            qd.className = 'mb-4 p-3 bg-gray-50 rounded-lg';
            qd.innerHTML = '<div class="font-medium text-gray-700 mb-2">第'+i+'问：</div><div class="question-content text-base">'+textToHtml(question[pk])+'</div>';
            questionContainer.appendChild(qd);
            const ic = document.createElement('div'); ic.className = 'mb-6';
            const input = document.createElement('textarea');
            input.className = 'w-full p-3 border border-gray-300 rounded-lg input-focus min-h-[80px] resize-y';
            input.placeholder = '请输入第'+i+'问答案';
            input.value = userAnswers[currentQuestionIndex][i] || '';
            input.oninput = function(e) { userAnswers[currentQuestionIndex][i] = e.target.value; };
            ic.appendChild(input); questionContainer.appendChild(ic);
          }
        }
      } else if (question['题型'] === '填空题') {
        const qtc = document.createElement('div');
        qtc.className = 'text-lg font-medium mb-4 text-gray-800';
        qtc.innerHTML = '题目 '+(currentQuestionIndex+1)+': <div class="question-content mt-2">'+textToHtml(question['题目'])+'</div>';
        questionContainer.appendChild(qtc);
        let bc = 0; for (let i = 1; i <= 10; i++) { if (question['答案'+i]) bc++; }
        const ic = document.createElement('div'); ic.className = 'space-y-3';
        if (bc > 0) {
          for (let i = 1; i <= bc; i++) {
            const ig = document.createElement('div'); ig.className = 'mb-4';
            const lbl = document.createElement('label'); lbl.className = 'block text-sm font-medium text-gray-700 mb-1'; lbl.textContent = '第'+i+'空：';
            ig.appendChild(lbl);
            const input = document.createElement('input'); input.type = 'text';
            input.className = 'w-full p-3 border border-gray-300 rounded-lg input-focus';
            input.placeholder = '请输入第'+i+'空答案';
            input.value = userAnswers[currentQuestionIndex][i] || '';
            input.oninput = function(e) { userAnswers[currentQuestionIndex][i] = e.target.value; };
            ig.appendChild(input); ic.appendChild(ig);
          }
        } else {
          const input = document.createElement('textarea');
          input.className = 'w-full p-3 border border-gray-300 rounded-lg input-focus min-h-[100px] resize-y';
          input.placeholder = '请输入填空题答案';
          input.value = userAnswers[currentQuestionIndex][1] || '';
          input.oninput = function(e) { userAnswers[currentQuestionIndex][1] = e.target.value; };
          ic.appendChild(input);
        }
        questionContainer.appendChild(ic);
      } else {
        const qtc = document.createElement('div');
        qtc.className = 'text-lg font-medium mb-4 text-gray-800';
        qtc.innerHTML = '题目 '+(currentQuestionIndex+1)+': <div class="question-content mt-2">'+textToHtml(question['题目'])+'</div>';
        questionContainer.appendChild(qtc);
        const cc = document.createElement('div'); cc.className = 'space-y-3';
        (question['shuffledOptions'] || []).forEach(opt => {
          const div = document.createElement('div');
          div.className = 'flex items-start p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer';
          div.onclick = function() {
            userAnswers[currentQuestionIndex][1] = opt.key;
            showQuestion();
          };
          const radio = document.createElement('input');
          radio.type = 'radio'; radio.name = 'choice-'+currentQuestionIndex; radio.value = opt.key;
          radio.className = 'w-4 h-4 text-primary focus:ring-primary mr-3 mt-0.5';
          if (userAnswers[currentQuestionIndex][1] === opt.key) radio.checked = true;
          const lbl = document.createElement('span'); lbl.className = 'font-medium text-gray-700 mr-2'; lbl.textContent = opt.key+'.';
          div.appendChild(radio); div.appendChild(lbl);
          const ct = document.createElement('div'); ct.className = 'ml-7 mt-1 text-gray-700'; ct.innerHTML = textToHtml(opt.value);
          div.appendChild(ct);
          cc.appendChild(div);
        });
        questionContainer.appendChild(cc);
      }
      renderMath(questionContainer);
    }

    // ========== 导航 ==========
    function updateNavigationButtons() {
      prevBtn.style.display = currentQuestionIndex > 0 ? '' : 'none';
      if (currentQuestionIndex >= questions.length - 1) { nextBtn.style.display = 'none'; submitBtn.style.display = ''; }
      else { nextBtn.style.display = ''; submitBtn.style.display = 'none'; }
    }

    function goToPrevQuestion() { if (currentQuestionIndex>0) { currentQuestionIndex--; showQuestion(); updateNavigationButtons(); } }
    function goToNextQuestion() { if (currentQuestionIndex<questions.length-1) { currentQuestionIndex++; showQuestion(); updateNavigationButtons(); } }

    function confirmSubmit() { if (confirm('确定要提交答案吗？提交后将无法修改。')) submitAnswers(); }
    function confirmExit() { if (confirm('确定要退出答题吗？当前进度将会丢失。')) returnToConfig(); }

    function submitAnswers() {
      clearInterval(timerInterval);
      showResults();
    }

    // ========== 显示结果 ==========
    function showResults() {
      resultContent.innerHTML = '';
      let correctCount = 0;
      let totalSelectQuestions = questions.filter(q => q['题型']==='选择题').length;
      questions.forEach((question, index) => {
        const ua = userAnswers[index] || {};
        let isCorrect = false, correctDisplay = '', userDisplay = '';
        if (question['题型'] === '选择题') {
          isCorrect = ua[1] === question['displayAnswer'];
          const co = question['shuffledOptions'] && question['shuffledOptions'][question['displayAnswer'].charCodeAt(0)-65];
          correctDisplay = question['displayAnswer']+': '+textToHtml(co?co.value:'');
          userDisplay = textToHtml(ua[1]||'未作答');
        } else {
          isCorrect = true;
          let ca = [];
          for (let i=1;i<=10;i++) { if (question['答案'+i]) ca.push(i+'. '+question['答案'+i]); }
          correctDisplay = ca.length>0 ? ca.map(a=>textToHtml(a)).join('<br>') : textToHtml(question['答案']||'');
          let ua2 = [];
          for (let i=1;i<=10;i++) { if (ua[i]) ua2.push(i+'. '+ua[i]); }
          userDisplay = ua2.length>0 ? ua2.map(a=>textToHtml(a)).join('<br>') : '未作答';
        }
        if (isCorrect && question['题型']==='选择题') correctCount++;
        const ri = document.createElement('div');
        ri.className = 'p-3 rounded-lg '+(question['题型']==='选择题'?(isCorrect?'bg-green-50 border border-green-100':'bg-red-50 border border-red-100'):'bg-gray-50 border border-gray-200');
        let qt = question['题型']==='材料题' ? textToHtml(question['材料内容']||'') : textToHtml(question['题目']);
        ri.innerHTML = '<div class="font-medium mb-1">题目 '+(index+1)+' ('+question['题型']+')</div>'+
          '<div class="text-sm text-gray-600 mb-2">'+qt+'</div>'+
          '<div class="text-sm mb-1"><span class="text-gray-600">你的答案：</span>'+userDisplay+'</div>'+
          '<div class="text-sm"><span class="text-gray-600">正确答案：</span>'+correctDisplay+'</div>'+
          (question['题型']==='选择题'?'<div class="text-sm font-medium mt-1 '+(isCorrect?'text-green-600':'text-red-600')+'">'+(isCorrect?'正确':'错误')+'</div>':'');
        resultContent.appendChild(ri);
      });
      const si = document.createElement('div');
      si.className = 'p-3 bg-primary/5 rounded-lg text-center mt-4';
      si.innerHTML = '<div class="text-lg font-bold text-primary">总得分：'+correctCount+'/'+totalSelectQuestions+'</div>'+
        '<div class="text-sm text-gray-600">正确率：'+(totalSelectQuestions>0?((correctCount/totalSelectQuestions)*100).toFixed(1):'0')+'%</div>'+
        '<div class="text-sm text-gray-600">用时：'+timerSpan.textContent+'</div>'+
        '<div class="text-sm text-gray-600 mt-1">注：填空题和问答题不计分</div>';
      resultContent.prepend(si);
      saveHistory(correctCount);
      renderMath(resultContent);
      resultModal.style.display = 'flex';
    }

    function saveHistory(correctCount) {
      const record = {
        date: new Date().toLocaleString(),
        subject: currentSubjectLabel || '学习助手',
        total: questions.length,
        correct: correctCount,
        accuracy: questions.filter(q=>q['题型']==='选择题').length>0?((correctCount/questions.filter(q=>q['题型']==='选择题').length)*100).toFixed(1)+'%':'0%',
        time: timerSpan.textContent,
        originalQuestions: questions.map(q => ({...q, shuffledOptions: q['shuffledOptions']?[...q['shuffledOptions']]:void 0})),
        userAnswers: [...userAnswers],
        csvData: null
      };
      const records = JSON.parse(localStorage.getItem(historyKey)||'[]');
      records.push(record);
      localStorage.setItem(historyKey, JSON.stringify(records));
    }

    function returnToConfig() {
      resultModal.style.display = 'none';
      questionPage.style.display = 'none';
      configPage.style.display = 'block';
      clearInterval(timerInterval);
      if (window.location.hash) window.location.hash = '';
      questions = []; userAnswers = [];
      loadBankData(currentGradeId);
      initFilterUI();
      renderQuestionBrowser();
    }

    // ========== 历史记录 ==========
    function showHistory() {
      const records = JSON.parse(localStorage.getItem(historyKey)||'[]');
      historyList.innerHTML = '';
      if (records.length === 0) {
        const em = document.createElement('div'); em.className = 'text-center py-6 text-neutral'; em.textContent = '暂无做题记录';
        historyList.appendChild(em);
      } else {
        records.slice().reverse().forEach((record, i) => {
          const oi = records.length-1-i;
          const ri = document.createElement('div');
          ri.className = 'p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors';
          ri.innerHTML = '<div class="flex justify-between items-start mb-2"><div class="font-medium">'+record.date+'</div>'+
            '<div class="flex gap-2"><button class="export-single-history text-primary text-sm" data-index="'+oi+'"><i class="fa fa-download mr-1"></i>导出</button>'+
            '<button class="delete-history text-danger text-sm" data-index="'+oi+'"><i class="fa fa-trash mr-1"></i>删除</button></div></div>'+
            '<div class="text-sm text-gray-600 space-y-1"><div>得分：'+record.correct+'/'+(record.originalQuestions||[]).filter(q=>q['题型']==='选择题').length+'（'+record.accuracy+'）</div>'+
            '<div>用时：'+record.time+'</div><div class="text-xs text-gray-500">注：填空题和问答题不计分</div></div>';
          historyList.appendChild(ri);
        });
        document.querySelectorAll('.export-single-history').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const idx = parseInt(this.dataset.index);
            exportSingleHistory(records[idx]);
          });
        });
        document.querySelectorAll('.delete-history').forEach(btn => {
          btn.addEventListener('click', function(e) {
            if (confirm('确定要删除这条记录吗？')) {
              const idx = parseInt(this.dataset.index);
              const recs = JSON.parse(localStorage.getItem(historyKey)||'[]');
              recs.splice(idx, 1);
              localStorage.setItem(historyKey, JSON.stringify(recs));
              showHistory();
            }
          });
        });
      }
      historyModal.style.display = 'flex';
    }

    function confirmClearAllHistory() {
      const records = JSON.parse(localStorage.getItem(historyKey)||'[]');
      if (records.length===0) { alert('暂无记录可清空'); return; }
      if (confirm('确定要清空所有历史记录吗？')) { localStorage.setItem(historyKey,'[]'); showHistory(); }
    }

    // ========== 导出 ==========
    function exportCurrentResult() {
      const timeUsed = timerSpan.textContent;
      const lines = ['题型,题目,用户答案,参考答案,是否正确,用时'];
      questions.forEach((q, idx) => {
        const uas = buildUserAnswerStr(q, idx);
        const cas = getCorrectAnswerStr(q);
        const cor = buildCorrectnessStr(q, idx);
        lines.push([escapeCsvField(q['题型']),escapeCsvField(q['题目']||''),escapeCsvField(uas),escapeCsvField(cas),escapeCsvField(cor),escapeCsvField(timeUsed)].join(','));
      });
      downloadCsv('做题结果_'+new Date().toISOString().split('T')[0]+'.csv', lines.join('\n'));
    }

    function exportSingleHistory(record) {
      const lines = ['题型,题目,用户答案,参考答案,是否正确,用时,记录日期'];
      (record.originalQuestions||[]).forEach((q, idx) => {
        const uas = buildUserAnswerStr(q, idx, record.userAnswers);
        const cas = getCorrectAnswerStr(q);
        const cor = buildCorrectnessStr(q, idx, record.userAnswers);
        lines.push([escapeCsvField(q['题型']),escapeCsvField(q['题目']||''),escapeCsvField(uas),escapeCsvField(cas),escapeCsvField(cor),escapeCsvField(record.time),escapeCsvField(record.date)].join(','));
      });
      downloadCsv('做题记录_'+record.date.replace(/[/:\s]/g,'_')+'.csv', lines.join('\n'));
    }

    function exportAllHistory() {
      const records = JSON.parse(localStorage.getItem(historyKey)||'[]');
      if (records.length===0) { alert('暂无记录可导出'); return; }
      const lines = ['题型,题目,用户答案,参考答案,是否正确,用时,记录日期'];
      records.forEach(record => {
        (record.originalQuestions||[]).forEach((q, idx) => {
          const uas = buildUserAnswerStr(q, idx, record.userAnswers);
          const cas = getCorrectAnswerStr(q);
          const cor = buildCorrectnessStr(q, idx, record.userAnswers);
          lines.push([escapeCsvField(q['题型']),escapeCsvField(q['题目']||''),escapeCsvField(uas),escapeCsvField(cas),escapeCsvField(cor),escapeCsvField(record.time),escapeCsvField(record.date)].join(','));
        });
      });
      downloadCsv('全部做题记录_'+new Date().toISOString().split('T')[0]+'.csv', lines.join('\n'));
    }

    function downloadCsv(filename, csvContent) {
      const BOM = '\uFEFF';
      const blob = new Blob([BOM + csvContent], {type:'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    // ========== URL 数据注入：从学习助手传入 ==========
    function checkExternalQuestions() {
      const hash = window.location.hash.substring(1);
      if (!hash) return false;

      // 方式1: quiz-data 直接传题（旧格式兼容）
      if (hash.startsWith('quiz-data=')) {
        try {
          const base64 = hash.substring(10);
          const json = decodeURIComponent(escape(atob(base64)));
          const extQs = JSON.parse(json);
          if (!extQs || extQs.length === 0) return false;
          questions = extQs.map((q, idx) => convertQuestionFromExternal(q, idx));
          return startExternalQuiz();
        } catch(e) { console.error('quiz-data解析失败:', e); return false; }
      }

      // 方式2: 按ID选择
      if (hash.startsWith('grade=') || hash.startsWith('paper=')) {
        try {
          const params = {};
          hash.split('&').forEach(part => { const [k,v] = part.split('='); params[k] = v||''; });
          loadBankData(params.grade || '');
          currentSubjectLabel = params.subject ? decodeURIComponent(params.subject) : '学习助手';

          if (params.paper) {
            // 按试卷：加载试卷中的题目
            const paper = bankPapers.find(p => p.id === params.paper);
            if (!paper) return false;
            const paperQs = (paper.questionIds || []).map(id => bankQuestions.find(q => q.id === id)).filter(Boolean);
            if (paperQs.length === 0) return false;
            questions = paperQs.map((q, idx) => convertQuestion(q, idx));
          } else if (params.ids) {
            // 按ID列表
            const idList = params.ids.split(',');
            const selectedQs = idList.map(id => bankQuestions.find(q => q.id === id)).filter(Boolean);
            if (selectedQs.length === 0) return false;
            questions = selectedQs.map((q, idx) => convertQuestion(q, idx));
          } else {
            return false;
          }

          // 随机选项排列
          questions.forEach(question => {
            if (question['题型'] === '选择题') { const r = getRandomOptions(question); question['shuffledOptions'] = r.options; question['displayAnswer'] = r.newCorrectAnswer; }
          });
          return startExternalQuiz();
        } catch(e) { console.error('参数解析失败:', e); return false; }
      }
      return false;
    }

    function convertQuestionFromExternal(q, idx) {
      const question = { '题型': q.type==='choice'?'选择题':(q.type==='fill'?'填空题':'材料题'), '题目': q.content||'', 'csvType': q.type==='choice'?'选择题':(q.type==='fill'?'填空题':'材料题'), 'originalLineIndex': idx };
      if (q._correctLetter) { question['答案'] = q._correctLetter; question['displayAnswer'] = q._correctLetter; }
      else { question['答案'] = q.answer||''; question['displayAnswer'] = q.answer; }
      const opts = q._shuffledOptions || [];
      opts.forEach((o, i) => { question[String.fromCharCode(65+i)] = o.value; });
      question['shuffledOptions'] = opts;
      if (q.type === 'fill') question['答案1'] = q.answer||'';
      else question['答案'] = q.answer||'';
      return question;
    }

    function startExternalQuiz() {
      userAnswers = new Array(questions.length).fill().map(() => ({}));
      currentQuestionIndex = 0; secondsElapsed = 0;
      configPage.style.display = 'none'; questionPage.style.display = 'block';
      currentSubjectSpan.textContent = currentSubjectLabel || '学习助手';
      timerInterval = setInterval(updateTimer, 1000);
      showQuestion();
      updateNavigationButtons();
      return true;
    }

    // ========== 初始化 ==========
    if (!checkExternalQuestions()) {
      loadBankData();
      initFilterUI();
      initQuickButtons();
      renderQuestionBrowser();
      initEventListeners();
    }
  </script>
