<body class="bg-gradient-to-br from-light to-gray-200 min-h-screen font-sans text-dark">
  <div class="container max-w-2xl mx-auto px-4 py-8">
    <!-- 第一个界面：配置界面 -->
    <div id="config-page" class="bg-white rounded-xl p-6 card-shadow">
      <div class="text-center mb-6">
        <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-primary mb-2">做题配置</h1>

      </div>
      
      <div class="space-y-5">

          <label for="subject" class="block text-sm font-medium text-gray-700 mb-1.5">

          <select id="subject" class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus">

            <i class="fa fa-pencil mr-2 text-primary"></i>填空题数量
          </label>
          <input type="number" id="fill-count" min="0" value="0"

        <div>

  <!-- 结果弹窗 -->
  <div id="result-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 card-shadow">

  <!-- 历史记录弹窗 -->

  <script>
    // 存储题目数据的全局变量
    let questions = [];
    // 存储用户答案的数组
    let userAnswers = [];
    // 记录当前题目索引
    let currentQuestionIndex = 0;
    // 计时器相关变量
    let timerInterval;
    let secondsElapsed = 0;
    // 存储各题型原始CSV数据
    let originalCsvDataMap = {
      '选择题': '',
      '填空题': '',
      '材料题': ''
    };

    // 三个CSV文件的URL（使用统一的CSV文件）
    const questionFiles = {
      '选择题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/multiple-choice.csv',
      '填空题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/blank-filling.csv',
      '材料题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/material-based.csv'
    };

    // 数组随机排序（Fisher-Yates 洗牌算法）
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    // 处理选择题选项随机排序
    function getRandomOptions(question) {
      // 收集有效的选项
      const options = [];
      ['A', 'B', 'C', 'D'].forEach(key => {
        if (question[key]) {
          options.push({ key, value: question[key] });
        }
      });
      
      // 随机排序选项
      const shuffledOptions = shuffleArray(options);
      
      // 找到正确答案对应的新选项字母
      let newCorrectAnswer = '';
      shuffledOptions.forEach((opt, index) => {
        if (opt.key === question['答案']) {
          // 索引0对应A，1对应B，依此类推
          newCorrectAnswer = String.fromCharCode(65 + index);
        }
      });
      
      return {
        options: shuffledOptions,
        newCorrectAnswer: newCorrectAnswer
      };
    }

    // 解析文本中的图片URL，将图片URL替换为img标签，同时保留其他文字
    function textToHtml(text) {
      if (!text) return '';
      
      const trimmedText = text.trim();
      // 匹配Markdown格式的图片标记 和纯图片URL
      const markdownImageRegex = /!\[.*?\]\((https?:\/\/[^\s]+)\)/gi;
      const plainUrlRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|bmp|webp|svg))/gi;
      
      let result = trimmedText;
      
      // 先处理Markdown格式的图片
      result = result.replace(markdownImageRegex, (match, url) => {
        return `<img src="${url}" class="question-image" alt="图片">`;
      });
      
      // 再处理纯图片URL
      result = result.replace(plainUrlRegex, (url) => {
        return `<img src="${url}" class="question-image" alt="图片">`;
      });
      
      return result;
    }

    // 解析文本中的图片URL，但只提取URL（用于答案比较）
    function extractImageUrls(text) {
      if (!text) return [];
      
      const imageUrls = [];
      const markdownImageRegex = /!\[.*?\]\((https?:\/\/[^\s]+)\)/gi;
      const plainUrlRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|bmp|webp|svg))/gi;
      
      // 匹配Markdown格式的图片
      let match;
      while ((match = markdownImageRegex.exec(text)) !== null) {
        imageUrls.push(match[1]);
      }
      
      // 匹配纯图片URL
      while ((match = plainUrlRegex.exec(text)) !== null) {
        imageUrls.push(match[0]);
      }
      
      return imageUrls;
    }

    // 科目对应的历史记录键名的映射
    const subjectHistoryMap = {
      语文: 'chinese_history',
      数学: 'math_history',
      英语: 'english_history',
      物理: 'physics_history',
      化学: 'chemistry_history',
      历史: 'history_history',
      道法: 'politics_history'
    };

    // 获取页面元素
    const configPage = document.getElementById('config-page');
    const questionPage = document.getElementById('question-page');
    const subjectSelect = document.getElementById('subject');
    const choiceCountInput = document.getElementById('choice-count');
    const fillCountInput = document.getElementById('fill-count');
    const materialCountInput = document.getElementById('material-count');
    const startBtn = document.getElementById('start-btn');
    const historyBtn = document.getElementById('history-btn');
    const timerSpan = document.getElementById('timer');
    const progressSpan = document.getElementById('progress');
    const currentSubjectSpan = document.getElementById('current-subject');
    const questionContainer = document.getElementById('question-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    const exitBtn = document.getElementById('exit-btn');
    const resultModal = document.getElementById('result-modal');
    const resultContent = document.getElementById('result-content');
    const backBtn = document.getElementById('back-btn');
    const exportResultBtn = document.getElementById('export-result-btn');
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const closeHistoryBtn = document.getElementById('close-history-btn');
    const exportAllHistoryBtn = document.getElementById('export-all-history-btn');
    const clearAllHistoryBtn = document.getElementById('clear-all-history-btn');

    // 初始化事件监听
    function initEventListeners() {
      startBtn.addEventListener('click', startQuizSetup);
      historyBtn.addEventListener('click', showHistory);
      prevBtn.addEventListener('click', goToPrevQuestion);
      nextBtn.addEventListener('click', goToNextQuestion);
      submitBtn.addEventListener('click', confirmSubmit);
      exitBtn.addEventListener('click', confirmExit);
      backBtn.addEventListener('click', returnToConfig);
      exportResultBtn.addEventListener('click', exportCurrentResult);
      closeHistoryBtn.addEventListener('click', () => {
        historyModal.style.display = 'none';
      });
      exportAllHistoryBtn.addEventListener('click', exportAllHistory);
      clearAllHistoryBtn.addEventListener('click', confirmClearAllHistory);
    }

    // 确认提交答案
    function confirmSubmit() {
      if (confirm('确定要提交答案吗？提交后将无法修改。')) {
        submitAnswers();
      }
    }

    // 确认退出答题
    function confirmExit() {
      if (confirm('确定要退出答题吗？当前进度将会丢失。')) {
        returnToConfig();
      }
    }

    // 确认清空所有历史记录
    function confirmClearAllHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      if (records.length === 0) {
        alert('暂无历史记录可清空');
        return;
      }
      
      if (confirm('确定要清空所有历史记录吗？此操作不可恢复。')) {
        localStorage.setItem(historyKey, JSON.stringify([]));
        showHistory(); // 刷新历史记录列表
      }
    }

    // 删除单条历史记录
    function deleteHistoryRecord(index) {
      if (confirm('确定要删除这条记录吗？此操作不可恢复。')) {
        const subject = subjectSelect.value;
        const historyKey = subjectHistoryMap[subject];
        let records = JSON.parse(localStorage.getItem(historyKey) || '[]');
        
        // 删除指定索引的记录
        records.splice(index, 1);
        localStorage.setItem(historyKey, JSON.stringify(records));
        showHistory(); // 刷新历史记录列表
      }
    }

    // 检测文本编码
    function detectEncoding(buffer) {
      const encodings = ['utf-8', 'gbk', 'gb2312', 'iso-8859-1', 'big5'];
      
      for (const encoding of encodings) {
        try {
          const decoder = new TextDecoder(encoding, { fatal: true });
          const text = decoder.decode(buffer);
          // 检查是否包含中文字符来判断是否是正确的编码
          if (/[\u4e00-\u9fff]/.test(text) || text.includes('题面') || text.includes('正确答案')) {
            return encoding;
          }
        } catch (e) {
          // 继续尝试下一个编码
        }
      }
      
      // 如果没有检测到，默认使用utf-8
      return 'utf-8';
    }

    // 解析CSV文本为题目数组
    function parseCSV(csvText, questionType, selectedSubject) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return [];
      
      // 保存对应题型的原始CSV数据
      originalCsvDataMap[questionType] = csvText;
      
      // 解析表头
      const headers = lines[0].split(',').map(h => h.trim());
      
      // 检查是否有科目列
      const hasSubjectColumn = headers.includes('科目');
      
      // 解析每一行数据
      const questions = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        // 处理CSV中的引号和逗号
        const values = [];
        let inQuotes = false;
        let currentValue = '';
        
        for (let j = 0; j < line.length; j++) {
          const char = line[j];
          
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(currentValue.trim());
            currentValue = '';
          } else {
            currentValue += char;
          }
        }
        values.push(currentValue.trim()); // 添加最后一个值
        
        const question = {};
        
        // 设置题型
        question['题型'] = questionType;
        
        // 映射CSV字段到对象属性
        headers.forEach((header, index) => {
          if (index < values.length) {
            const value = values[index];
            switch(header) {
              case '题面':
                question['题目'] = value;
                break;
              case '材料内容':
                question['材料内容'] = value; // 材料题的题面内容
                break;
              case '问题':
                question['问题'] = value;
                break;
              case '第1问题面':
                question['问题1'] = value;
                break;
              case '第1问答案':
                question['答案1'] = value;
                break;
              case '第2问题面':
                question['问题2'] = value;
                break;
              case '第2问答案':
                question['答案2'] = value;
                break;
              case '第3问题面':
                question['问题3'] = value;
                break;
              case '第3问答案':
                question['答案3'] = value;
                break;
              case '第4问题面':
                question['问题4'] = value;
                break;
              case '第4问答案':
                question['答案4'] = value;
                break;
              case '第5问题面':
                question['问题5'] = value;
                break;
              case '第5问答案':
                question['答案5'] = value;
                break;
              case '第6问题面':
                question['问题6'] = value;
                break;
              case '第6问答案':
                question['答案6'] = value;
                break;
              case '第7问题面':
                question['问题7'] = value;
                break;
              case '第7问答案':
                question['答案7'] = value;
                break;
              case '第8问题面':
                question['问题8'] = value;
                break;
              case '第8问答案':
                question['答案8'] = value;
                break;
              case '第9问题面':
                question['问题9'] = value;
                break;
              case '第9问答案':
                question['答案9'] = value;
                break;
              case '第10问题面':
                question['问题10'] = value;
                break;
              case '第10问答案':
                question['答案10'] = value;
                break;
              case 'A':
              case 'B':
              case 'C':
              case 'D':
                question[header] = value;
                break;
              case '正确答案':
                question['答案'] = value;
                // 保存原始答案，用于后续导出
                question['originalAnswer'] = value;
                break;
              case '第1空答案':
                question['答案1'] = value;
                break;
              case '第2空答案':
                question['答案2'] = value;
                break;
              case '第3空答案':
                question['答案3'] = value;
                break;
              case '第4空答案':
                question['答案4'] = value;
                break;
              case '第5空答案':
                question['答案5'] = value;
                break;
              case '第6空答案':
                question['答案6'] = value;
                break;
              case '第7空答案':
                question['答案7'] = value;
                break;
              case '第8空答案':
                question['答案8'] = value;
                break;
              case '第9空答案':
                question['答案9'] = value;
                break;
              case '第10空答案':
                question['答案10'] = value;
                break;
              case '科目':
                question['科目'] = value;
                break;
              case '来源':
                question['来源'] = value;
                break;
              default:
                question[header] = value;
            }
          }
        });
        
        // 如果有科目列，检查是否匹配当前选择的科目
        if (hasSubjectColumn && question['科目'] && question['科目'] !== selectedSubject) {
          continue; // 跳过不匹配的科目
        }
        
        // 检查是否有必要的数据
        let hasData = false;
        
        if (questionType === '选择题') {
          // 选择题需要有题目和答案
          hasData = question['题目'] && question['答案'];
        } else if (questionType === '填空题') {
          // 填空题需要有题目
          hasData = question['题目'];
        } else if (questionType === '材料题') {
          // 材料题需要有材料内容或问题
          hasData = question['材料内容'] || question['问题'] || question['问题1'];
        }
        
        if (!hasData) {
          continue; // 跳过无效数据
        }
        
        // 保存原始行索引，用于导出时准确匹配
        question['originalLineIndex'] = i;
        // 保存来自哪个题型，用于导出时查找对应的原始CSV数据
        question['csvType'] = questionType;
        questions.push(question);
      }
      return questions;
    }

    // 筛选符合条件的题目（随机排序）
    function filterQuestions(allQuestions, choiceCount, fillCount, materialCount) {
      const filtered = [];
      
      // 筛选选择题并随机排序
      const choiceQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '选择题'));
      const takeChoices = Math.min(choiceCount, choiceQuestions.length);
      filtered.push(...choiceQuestions.slice(0, takeChoices));
      
      // 筛选填空题并随机排序
      const fillQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '填空题'));
      const takeFills = Math.min(fillCount, fillQuestions.length);
      filtered.push(...fillQuestions.slice(0, takeFills));
      
      // 筛选材料题（解答题）并随机排序
      const materialQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '材料题'));
      const takeMaterials = Math.min(materialCount, materialQuestions.length);
      filtered.push(...materialQuestions.slice(0, takeMaterials));
      
      // 对所有选中的题目再次进行随机排序
      return shuffleArray(filtered);
    }

    // 开始做题设置
    async function startQuizSetup() {
      const subject = subjectSelect.value;
      const choiceCount = parseInt(choiceCountInput.value) || 0;
      const fillCount = parseInt(fillCountInput.value) || 0;
      const materialCount = parseInt(materialCountInput.value) || 0;

      // 验证输入
      if (choiceCount <= 0 && fillCount <= 0 && materialCount <= 0) {
        alert('请至少选择一种题型并设置数量');
        return;
      }
      
      try {
        // 并行加载三个CSV文件
        const [choiceResponse, fillResponse, materialResponse] = await Promise.all([
          fetch(questionFiles['选择题']),
          fetch(questionFiles['填空题']),
          fetch(questionFiles['材料题'])
        ]);
        
        if (!choiceResponse.ok || !fillResponse.ok || !materialResponse.ok) {
          throw new Error('题目文件不存在');
        }
        
        // 获取ArrayBuffer
        const [choiceBuffer, fillBuffer, materialBuffer] = await Promise.all([
          choiceResponse.arrayBuffer(),
          fillResponse.arrayBuffer(),
          materialResponse.arrayBuffer()
        ]);
        
        // 自动检测编码并解码
        const choiceEncoding = detectEncoding(choiceBuffer);
        const fillEncoding = detectEncoding(fillBuffer);
        const materialEncoding = detectEncoding(materialBuffer);
        
        const decoder1 = new TextDecoder(choiceEncoding);
        const decoder2 = new TextDecoder(fillEncoding);
        const decoder3 = new TextDecoder(materialEncoding);
        
        const choiceText = decoder1.decode(choiceBuffer);
        const fillText = decoder2.decode(fillBuffer);
        const materialText = decoder3.decode(materialBuffer);
        
        // 解析三个CSV文件
        const choiceQuestions = parseCSV(choiceText, '选择题', subject);
        const fillQuestions = parseCSV(fillText, '填空题', subject);
        const materialQuestions = parseCSV(materialText, '材料题', subject);
        
        // 合并所有题目
        const allQuestions = [...choiceQuestions, ...fillQuestions, ...materialQuestions];
        
        if (allQuestions.length === 0) {
          alert('未解析到题目数据，请检查CSV格式和内容');
          return;
        }
        
        // 筛选出对应题型和数量的题目（随机）
        const filteredQuestions = filterQuestions(allQuestions, choiceCount, fillCount, materialCount);
        if (filteredQuestions.length === 0) {
          alert('没有足够的题目，请减少题目数量');
          return;
        }
        
        // 处理选择题的随机选项并更新正确答案
        filteredQuestions.forEach(question => {
          if (question['题型'] === '选择题') {
            const { options, newCorrectAnswer } = getRandomOptions(question);
            // 保存随机后的选项映射关系
            question['shuffledOptions'] = options;
            // 更新当前题目使用的正确答案（随机后的字母）
            question['displayAnswer'] = newCorrectAnswer;
          }
        });
        
        questions = filteredQuestions;
        // 初始化用户答案数组
        userAnswers = new Array(questions.length).fill().map(() => ({}));
        currentQuestionIndex = 0;
        secondsElapsed = 0;
        
        startQuiz();
      } catch (error) {
        console.error('加载题目出错:', error);
        alert('加载题目失败，请确保题目文件存在。错误信息：' + error.message);
      }
    }

    // 开始做题
    function startQuiz() {
      configPage.style.display = 'none';
      questionPage.style.display = 'block';
      currentSubjectSpan.textContent = subjectSelect.value;
      
      // 重置计时器
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      
      showQuestion();
      updateNavigationButtons();
    }

    // 更新计时器
    function updateTimer() {
      secondsElapsed++;
      const minutes = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
      const seconds = (secondsElapsed % 60).toString().padStart(2, '0');
      timerSpan.textContent = `${minutes}:${seconds}`;
      
      // 超过10分钟添加警告样式
      if (secondsElapsed > 600) {
        timerSpan.classList.add('text-warning', 'font-bold');
      } else {
        timerSpan.classList.remove('text-warning', 'font-bold');
      }
    }

    // 上一题
    function goToPrevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        showQuestion();
        updateNavigationButtons();
      }
    }

    // 下一题
    function goToNextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        showQuestion();
        updateNavigationButtons();
      }
    }

    // 更新导航按钮状态
    function updateNavigationButtons() {
      prevBtn.style.display = currentQuestionIndex > 0 ? 'block' : 'none';
      
      if (currentQuestionIndex === questions.length - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'block';
      } else {
        nextBtn.style.display = 'block';
        submitBtn.style.display = 'none';
      }
    }

    // 提交答案
    function submitAnswers() {
      clearInterval(timerInterval);
      showResults();
    }

    // 显示结果（支持文字+图片混合）
    function showResults() {
      resultContent.innerHTML = '';
      let correctCount = 0;
      let totalSelectQuestions = questions.filter(q => q['题型'] === '选择题').length;
      
      questions.forEach((question, index) => {
        const userAnswer = userAnswers[index] || {};
        let isCorrect = false;
        let correctAnswerDisplay = '';
        let userAnswerDisplay = '';
        
        if (question['题型'] === '选择题') {
          // 选择题使用随机后的答案进行判断
          isCorrect = userAnswer[1] === question['displayAnswer'];
          // 显示正确答案字母和对应的选项内容
          const correctOption = question['shuffledOptions'].find((_, i) => 
            String.fromCharCode(65 + i) === question['displayAnswer']
          );
          correctAnswerDisplay = `${question['displayAnswer']}: ${textToHtml(correctOption ? correctOption.value : '')}`;
          userAnswerDisplay = textToHtml(userAnswer[1] || '未作答');
        } else if (question['题型'] === '填空题') {
          // 填空题不判断对错，只显示答案
          isCorrect = true; // 填空题不计入正确计数
          
          // 构建填空题答案显示
          let allAnswers = [];
          for (let i = 1; i <= 10; i++) {
            const answerKey = `答案${i}`;
            if (question[answerKey]) {
              allAnswers.push(`${i}. ${question[answerKey]}`);
            }
          }
          if (allAnswers.length > 0) {
            correctAnswerDisplay = allAnswers.map(a => textToHtml(a)).join('<br>');
          } else if (question['答案']) {
            correctAnswerDisplay = textToHtml(question['答案']);
          }
          
          // 构建用户答案显示
          let userAnswersArray = [];
          for (let i = 1; i <= 10; i++) {
            if (userAnswer[i]) {
              userAnswersArray.push(`${i}. ${userAnswer[i]}`);
            }
          }
          userAnswerDisplay = userAnswersArray.length > 0 ? 
            userAnswersArray.map(a => textToHtml(a)).join('<br>') : '未作答';
        } else if (question['题型'] === '材料题') {
          // 材料题不判断对错，只显示答案
          isCorrect = true; // 材料题不计入正确计数
          
          // 构建材料题答案显示
          if (question['答案']) {
            // 如果只有一个答案
            correctAnswerDisplay = textToHtml(question['答案']);
          } else {
            // 如果有多个答案
            let allAnswers = [];
            for (let i = 1; i <= 10; i++) {
              const answerKey = `答案${i}`;
              if (question[answerKey]) {
                allAnswers.push(`${i}. ${question[answerKey]}`);
              }
            }
            correctAnswerDisplay = allAnswers.map(a => textToHtml(a)).join('<br>');
          }
          
          // 构建用户答案显示
          let userAnswersArray = [];
          for (let i = 1; i <= 10; i++) {
            if (userAnswer[i]) {
              userAnswersArray.push(`${i}. ${userAnswer[i]}`);
            }
          }
          userAnswerDisplay = userAnswersArray.length > 0 ? 
            userAnswersArray.map(a => textToHtml(a)).join('<br>') : '未作答';
        }

              if (question[problemKey]) {

              }

            ${isCorrect ? '正确' : '错误'}

      resultModal.style.display = 'flex';
    }

    // 保存历史记录到localStorage
    function saveHistory(correctCount) {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      
      // 构建历史记录对象
      const historyRecord = {
        date: new Date().toLocaleString(),
        subject: subject,
        total: questions.length,
        correct: correctCount,
        accuracy: questions.filter(q => q['题型'] === '选择题').length > 0 ? 
          ((correctCount/questions.filter(q => q['题型'] === '选择题').length)*100).toFixed(1) + '%' : '0%',
        time: timerSpan.textContent,
        // 保存题目原始数据
        originalQuestions: questions.map(q => ({
          ...q,
          shuffledOptions: q['shuffledOptions'] ? [...q['shuffledOptions']] : undefined,
          csvType: q['csvType'],
          originalLineIndex: q['originalLineIndex']
        })),
        userAnswers: [...userAnswers],
        // 保存原始CSV数据引用
        csvData: {
          '选择题': originalCsvDataMap['选择题'],
          '填空题': originalCsvDataMap['填空题'],
          '材料题': originalCsvDataMap['材料题']
        }
      };
      
      // 从localStorage获取已有记录
      const existingRecords = JSON.parse(localStorage.getItem(historyKey) || '[]');
      existingRecords.push(historyRecord);
      
      // 保存回localStorage
      localStorage.setItem(historyKey, JSON.stringify(existingRecords));
    }

    // 显示历史记录
    function showHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      historyList.innerHTML = '';
      
      if (records.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'text-center py-6 text-neutral';
        emptyMsg.textContent = '暂无该科目的做题记录';
        historyList.appendChild(emptyMsg);
      } else {
        // 倒序显示，最新的在前面
        records.slice().reverse().forEach((record, i) => {
          const originalIndex = records.length - 1 - i;
          const recordItem = document.createElement('div');
          recordItem.className = 'p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors';
          
          recordItem.innerHTML = `
            <div class="flex justify-between items-start mb-2">
              <div class="font-medium">${record.date}</div>
              <div class="flex gap-2">
                <button class="export-single-history text-primary text-sm" data-index="${originalIndex}">
                  <i class="fa fa-download mr-1"></i>导出
                </button>
                <button class="delete-history text-danger text-sm" data-index="${originalIndex}">
                  <i class="fa fa-trash mr-1"></i>删除
                </button>
              </div>
            </div>
            <div class="text-sm text-gray-600 space-y-1">
              <div>得分：${record.correct}/${record.originalQuestions.filter(q => q['题型'] === '选择题').length}（${record.accuracy}）</div>
              <div>用时：${record.time}</div>
              <div class="text-xs text-gray-500">注：填空题和材料题不计分</div>
            </div>
          `;
          
          historyList.appendChild(recordItem);
        });
        
        // 为单个记录导出按钮添加事件
        document.querySelectorAll('.export-single-history').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = parseInt(e.target.closest('.export-single-history').dataset.index);
            exportSingleHistory(records[index]);
          });
        });
        
        // 为单个记录删除按钮添加事件
        document.querySelectorAll('.delete-history').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = parseInt(e.target.closest('.delete-history').dataset.index);
            deleteHistoryRecord(index);
          });
        });
      }
      
      historyModal.style.display = 'flex';
    }

    // 处理CSV字段中的特殊字符
    function escapeCsvField(field) {
      if (!field) return '';
      // 如果包含逗号、引号或换行符，则需要用引号包裹
      if (field.includes(',') || field.includes('"') || field.includes('\n')) {
        // 替换引号为两个引号
        return `"${field.replace(/"/g, '""')}"`;
      }
      return field;
    }

    // 导出当前结果为CSV（在原始CSV基础上添加用户答案和时间）
    function exportCurrentResult() {
      const subject = subjectSelect.value;
      const timeUsed = timerSpan.textContent;
      
      // 分别处理三种题型的CSV数据
      const resultLines = [];
      
      // 添加表头（基于选择题的CSV表头）
      const choiceCsvLines = originalCsvDataMap['选择题'].trim().split('\n');
      if (choiceCsvLines.length > 0) {
        resultLines.push(choiceCsvLines[0] + ',用户答案,用时,是否正确,题型');
      }
      
      // 处理每道题
      questions.forEach((question, index) => {
        const csvType = question['csvType'];
        const originalLineIndex = question['originalLineIndex'];
        const csvLines = originalCsvDataMap[csvType].trim().split('\n');
        
        if (originalLineIndex < csvLines.length) {
          const originalLine = csvLines[originalLineIndex];
          let userAnswer = userAnswers[index] || {};
          let userAnswerStr = '';
          let isCorrect = '未判断';
          
          // 构建用户答案字符串
          if (question['题型'] === '选择题') {
            userAnswerStr = userAnswer[1] || '未作答';
            const correct = userAnswer[1] === question['displayAnswer'];
            isCorrect = correct ? '正确' : '错误';
          } else if (question['题型'] === '填空题' || question['题型'] === '材料题') {
            // 对于填空题和材料题，合并所有小问的答案
            const answerParts = [];
            for (let i = 1; i <= 10; i++) {
              if (userAnswer[i]) {
                answerParts.push(`${i}:${userAnswer[i]}`);
              }
            }
            userAnswerStr = answerParts.join('; ') || '未作答';
          }
          
          // 转义特殊字符
          const escapedUserAnswer = escapeCsvField(userAnswerStr);
          const escapedTimeUsed = escapeCsvField(timeUsed);
          const escapedIsCorrect = escapeCsvField(isCorrect);
          const escapedQuestionType = escapeCsvField(question['题型']);
          
          resultLines.push(`${originalLine},${escapedUserAnswer},${escapedTimeUsed},${escapedIsCorrect},${escapedQuestionType}`);
        }
      });
      
      const csvContent = resultLines.join('\n');
      
      // 创建下载链接
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      
      // 处理文件名中的特殊字符
      const safeDate = new Date().toLocaleDateString().replace(/\//g, '-');
      const safeTime = new Date().toLocaleTimeString().replace(/:/g, '-');
      a.setAttribute('download', `${subject}_做题结果_${safeDate}_${safeTime}.csv`);
      
      a.style.visibility = 'hidden';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 导出单条历史记录
    function exportSingleHistory(record) {
      const timeUsed = record.time;
      
      // 分别处理三种题型的CSV数据
      const resultLines = [];
      
      // 添加表头（基于选择题的CSV表头）
      const choiceCsvLines = record.csvData['选择题'].trim().split('\n');
      if (choiceCsvLines.length > 0) {
        resultLines.push(choiceCsvLines[0] + ',用户答案,用时,是否正确,题型,记录日期');
      }
      
      // 处理每道题
      record.originalQuestions.forEach((question, index) => {
        const csvType = question['csvType'];
        const originalLineIndex = question['originalLineIndex'];
        const csvLines = record.csvData[csvType].trim().split('\n');
        
        if (originalLineIndex < csvLines.length) {
          const originalLine = csvLines[originalLineIndex];
          let userAnswer = record.userAnswers[index] || {};
          let userAnswerStr = '';
          let isCorrect = '未判断';
          
          // 构建用户答案字符串
          if (question['题型'] === '选择题') {
            userAnswerStr = userAnswer[1] || '未作答';
            const correct = userAnswer[1] === question['displayAnswer'];
            isCorrect = correct ? '正确' : '错误';
          } else if (question['题型'] === '填空题' || question['题型'] === '材料题') {
            // 对于填空题和材料题，合并所有小问的答案
            const answerParts = [];
            for (let i = 1; i <= 10; i++) {
              if (userAnswer[i]) {
                answerParts.push(`${i}:${userAnswer[i]}`);
              }
            }
            userAnswerStr = answerParts.join('; ') || '未作答';
          }
          
          // 转义特殊字符
          const escapedUserAnswer = escapeCsvField(userAnswerStr);
          const escapedTimeUsed = escapeCsvField(timeUsed);
          const escapedIsCorrect = escapeCsvField(isCorrect);
          const escapedQuestionType = escapeCsvField(question['题型']);
          const escapedDate = escapeCsvField(record.date);
          
          resultLines.push(`${originalLine},${escapedUserAnswer},${escapedTimeUsed},${escapedIsCorrect},${escapedQuestionType},${escapedDate}`);
        }
      });
      
      const csvContent = resultLines.join('\n');
      return csvContent;
    }

    // 导出所有历史记录（包含所有题目）
    function exportAllHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      if (records.length === 0) {
        alert('暂无历史记录可导出');
        return;
      }
      
      // 用于存储所有记录的CSV内容
      let allCsvContent = '';
      let isFirstRecord = true;
      
      // 逐个处理每条记录
      records.forEach((record, recordIndex) => {
        // 获取单条记录的CSV内容
        const recordCsv = exportSingleHistory(record);
        const lines = recordCsv.split('\n');
        
        if (lines.length === 0) return;
        
        // 对于第一条记录，保留表头
        if (isFirstRecord) {
          allCsvContent += lines.join('\n') + '\n';
          isFirstRecord = false;
        } else {
          // 对于后续记录，跳过表头
          if (lines.length > 1) {
            allCsvContent += lines.slice(1).join('\n') + '\n';
          }
        }
      });
      
      // 创建下载链接
      const blob = new Blob([allCsvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      
      // 处理文件名中的特殊字符
      const safeDate = new Date().toLocaleDateString().replace(/\//g, '-');
      const safeTime = new Date().toLocaleTimeString().replace(/:/g, '-');
      a.setAttribute('download', `${subject}_所有做题记录_${safeDate}_${safeTime}.csv`);
      
      a.style.visibility = 'hidden';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 返回配置页面
    function returnToConfig() {
      resultModal.style.display = 'none';
      questionPage.style.display = 'none';
      configPage.style.display = 'block';
      clearInterval(timerInterval);
    }

    // 初始化
    initEventListeners();
  </script>
