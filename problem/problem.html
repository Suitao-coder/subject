<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能做题系统</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#10b981',
            neutral: '#64748b',
            light: '#f1f5f9',
            dark: '#1e293b',
            warning: '#f59e0b',
            danger: '#ef4444'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .card-shadow {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .btn-hover {
        @apply transition-all duration-300 transform hover:scale-105 hover:shadow-lg;
      }
      .input-focus {
        @apply focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none;
      }
      .question-image {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        margin: 0.5rem 0;
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-light to-gray-200 min-h-screen font-sans text-dark">
  <div class="container max-w-2xl mx-auto px-4 py-8">
    <!-- 第一个界面：配置界面 -->
    <div id="config-page" class="bg-white rounded-xl p-6 card-shadow">
      <div class="text-center mb-6">
        <h1 class="text-[clamp(1.5rem,3vw,2rem)] font-bold text-primary mb-2">做题配置</h1>
        <p class="text-neutral">请选择科目和题目数量开始练习</p>
      </div>
      
      <div class="space-y-5">
        <div>
          <label for="subject" class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fa fa-book mr-2 text-primary"></i>科目
          </label>
          <select id="subject" class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus">
            <option value="语文">语文</option>
            <option value="数学">数学</option>
            <option value="英语">英语</option>
            <option value="物理">物理</option>
            <option value="化学">化学</option>
            <option value="历史">历史</option>
            <option value="道法">道法</option>
          </select>
        </div>
        
        <div>
          <label for="choice-count" class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fa fa-list-ul mr-2 text-primary"></i>选择题数量
          </label>
          <input type="number" id="choice-count" min="0" value="0" 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus">
        </div>
        
        <div>
          <label for="fill-count" class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fa fa-pencil mr-2 text-primary"></i>填空题数量
          </label>
          <input type="number" id="fill-count" min="0" value="0" 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus">
        </div>
        
        <div>
          <label for="material-count" class="block text-sm font-medium text-gray-700 mb-1.5">
            <i class="fa fa-file-text mr-2 text-primary"></i>材料题（解答题）数量
          </label>
          <input type="number" id="material-count" min="0" value="0" 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg input-focus">
        </div>
        
        <div class="flex flex-wrap gap-3 mt-6">
          <button id="start-btn" class="flex-1 bg-primary text-white font-medium py-2.5 px-4 rounded-lg btn-hover">
            <i class="fa fa-play mr-2"></i>开始做题
          </button>
          <button id="history-btn" class="flex-1 bg-neutral text-white font-medium py-2.5 px-4 rounded-lg btn-hover">
            <i class="fa fa-history mr-2"></i>历史记录
          </button>
        </div>
      </div>
    </div>

    <!-- 第二个界面：做题界面 -->
    <div id="question-page" class="bg-white rounded-xl p-6 card-shadow" style="display: none;">
      <div id="header" class="flex justify-between items-center mb-6 pb-3 border-b border-gray-200">
        <div class="flex items-center text-neutral">
          <i class="fa fa-clock-o mr-2"></i>
          <span id="timer" class="font-medium">00:00</span>
        </div>
        <div class="flex items-center text-neutral">
          <i class="fa fa-progress mr-2"></i>
          <span id="progress" class="font-medium">0/0</span>
        </div>
        <div class="flex items-center px-3 py-1 bg-primary/10 text-primary rounded-full text-sm font-medium">
          <i class="fa fa-bookmark-o mr-1"></i>
          <span id="current-subject"></span>
        </div>
      </div>
      
      <div id="question-container" class="min-h-[300px] mb-6"></div>
      
      <div class="flex justify-between">
        <button id="exit-btn" class="bg-danger text-white font-medium py-2 px-4 rounded-lg btn-hover">
          <i class="fa fa-sign-out mr-1"></i>退出答题
        </button>
        <button id="prev-btn" class="bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg btn-hover" style="display: none;">
          <i class="fa fa-arrow-left mr-1"></i>上一题
        </button>
        <button id="next-btn" class="bg-primary text-white font-medium py-2 px-4 rounded-lg btn-hover">
          下一题<i class="fa fa-arrow-right ml-1"></i>
        </button>
        <button id="submit-btn" class="bg-secondary text-white font-medium py-2 px-4 rounded-lg btn-hover" style="display: none;">
          <i class="fa fa-check mr-1"></i>提交答案
        </button>
      </div>
    </div>
  </div>

  <!-- 结果弹窗 -->
  <div id="result-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 card-shadow">
      <h2 class="text-xl font-bold text-center text-primary mb-4">做题结果</h2>
      <div id="result-content" class="max-h-[400px] overflow-y-auto mb-5 text-sm space-y-2"></div>
      <div class="flex gap-3">
        <button id="back-btn" class="flex-1 bg-neutral text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-home mr-1"></i>返回首页
        </button>
        <button id="export-result-btn" class="flex-1 bg-primary text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-download mr-1"></i>导出结果
        </button>
      </div>
    </div>
  </div>

  <!-- 历史记录弹窗 -->
  <div id="history-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4 card-shadow max-h-[80vh] flex flex-col">
      <h2 class="text-xl font-bold text-center text-primary mb-4">历史记录</h2>
      <div id="history-list" class="flex-1 overflow-y-auto mb-4 space-y-3"></div>
      <div class="flex gap-3">
        <button id="clear-all-history-btn" class="flex-1 bg-danger text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-trash mr-1"></i>清空记录
        </button>
        <button id="close-history-btn" class="flex-1 bg-neutral text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-times mr-1"></i>关闭
        </button>
        <button id="export-all-history-btn" class="flex-1 bg-primary text-white font-medium py-2 rounded-lg btn-hover">
          <i class="fa fa-download mr-1"></i>导出全部
        </button>
      </div>
    </div>
  </div>

  <script>
    // 存储题目数据的全局变量
    let questions = [];
    // 存储用户答案的数组
    let userAnswers = [];
    // 记录当前题目索引
    let currentQuestionIndex = 0;
    // 计时器相关变量
    let timerInterval;
    let secondsElapsed = 0;
    // 存储各题型原始CSV数据
    let originalCsvDataMap = {
      '选择题': '',
      '填空题': '',
      '材料题': ''
    };

    // 三个CSV文件的URL（请用户自行修改）
    const questionFiles = {
      '选择题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/multiple-choice.csv', // 请用户填写选择题CSV文件URL
      '填空题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/blank-filling.csv', // 请用户填写填空题CSV文件URL
      '材料题': 'https://raw.githubusercontent.com/suitao-coder/subject/main/problem/material-based.csv'  // 请用户填写材料题CSV文件URL
    };

    // 科目与文件URL映射
    const subjectFileMap = {
      '语文': { choice: '', fill: '', material: '' },
      '数学': { choice: '', fill: '', material: '' },
      '英语': { choice: '', fill: '', material: '' },
      '物理': { choice: '', fill: '', material: '' },
      '化学': { choice: '', fill: '', material: '' },
      '历史': { choice: '', fill: '', material: '' },
      '道法': { choice: '', fill: '', material: '' }
    };

    // 数组随机排序（Fisher-Yates 洗牌算法）
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    // 处理选择题选项随机排序
    function getRandomOptions(question) {
      // 收集有效的选项
      const options = [];
      ['A', 'B', 'C', 'D'].forEach(key => {
        if (question[key]) {
          options.push({ key, value: question[key] });
        }
      });
      
      // 随机排序选项
      const shuffledOptions = shuffleArray(options);
      
      // 找到正确答案对应的新选项字母
      let newCorrectAnswer = '';
      shuffledOptions.forEach((opt, index) => {
        if (opt.key === question['答案']) {
          // 索引0对应A，1对应B，依此类推
          newCorrectAnswer = String.fromCharCode(65 + index);
        }
      });
      
      return {
        options: shuffledOptions,
        newCorrectAnswer: newCorrectAnswer
      };
    }

    // 解析文本中的图片URL，将图片URL替换为img标签，同时保留其他文字
    function textToHtml(text) {
      if (!text) return '';
      
      const trimmedText = text.trim();
      // 匹配文本中的所有图片URL（支持http/https，各种图片后缀）
      const imageUrlRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|bmp|webp))/gi;
      
      // 替换图片URL为img标签，保留其他文字
      return trimmedText.replace(imageUrlRegex, (match) => {
        return ``;
      });
    }

    // 科目对应的历史记录键名的映射
    const subjectHistoryMap = {
      语文: 'chinese_history',
      数学: 'math_history',
      英语: 'english_history',
      物理: 'physics_history',
      化学: 'chemistry_history',
      历史: 'history_history',
      道法: 'politics_history'
    };

    // 获取页面元素
    const configPage = document.getElementById('config-page');
    const questionPage = document.getElementById('question-page');
    const subjectSelect = document.getElementById('subject');
    const choiceCountInput = document.getElementById('choice-count');
    const fillCountInput = document.getElementById('fill-count');
    const materialCountInput = document.getElementById('material-count');
    const startBtn = document.getElementById('start-btn');
    const historyBtn = document.getElementById('history-btn');
    const timerSpan = document.getElementById('timer');
    const progressSpan = document.getElementById('progress');
    const currentSubjectSpan = document.getElementById('current-subject');
    const questionContainer = document.getElementById('question-container');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    const exitBtn = document.getElementById('exit-btn');
    const resultModal = document.getElementById('result-modal');
    const resultContent = document.getElementById('result-content');
    const backBtn = document.getElementById('back-btn');
    const exportResultBtn = document.getElementById('export-result-btn');
    const historyModal = document.getElementById('history-modal');
    const historyList = document.getElementById('history-list');
    const closeHistoryBtn = document.getElementById('close-history-btn');
    const exportAllHistoryBtn = document.getElementById('export-all-history-btn');
    const clearAllHistoryBtn = document.getElementById('clear-all-history-btn');

    // 初始化事件监听
    function initEventListeners() {
      startBtn.addEventListener('click', startQuizSetup);
      historyBtn.addEventListener('click', showHistory);
      prevBtn.addEventListener('click', goToPrevQuestion);
      nextBtn.addEventListener('click', goToNextQuestion);
      submitBtn.addEventListener('click', confirmSubmit);
      exitBtn.addEventListener('click', confirmExit);
      backBtn.addEventListener('click', returnToConfig);
      exportResultBtn.addEventListener('click', exportCurrentResult);
      closeHistoryBtn.addEventListener('click', () => {
        historyModal.style.display = 'none';
      });
      exportAllHistoryBtn.addEventListener('click', exportAllHistory);
      clearAllHistoryBtn.addEventListener('click', confirmClearAllHistory);
    }

    // 确认提交答案
    function confirmSubmit() {
      if (confirm('确定要提交答案吗？提交后将无法修改。')) {
        submitAnswers();
      }
    }

    // 确认退出答题
    function confirmExit() {
      if (confirm('确定要退出答题吗？当前进度将会丢失。')) {
        returnToConfig();
      }
    }

    // 确认清空所有历史记录
    function confirmClearAllHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      if (records.length === 0) {
        alert('暂无历史记录可清空');
        return;
      }
      
      if (confirm('确定要清空所有历史记录吗？此操作不可恢复。')) {
        localStorage.setItem(historyKey, JSON.stringify([]));
        showHistory(); // 刷新历史记录列表
      }
    }

    // 删除单条历史记录
    function deleteHistoryRecord(index) {
      if (confirm('确定要删除这条记录吗？此操作不可恢复。')) {
        const subject = subjectSelect.value;
        const historyKey = subjectHistoryMap[subject];
        let records = JSON.parse(localStorage.getItem(historyKey) || '[]');
        
        // 删除指定索引的记录
        records.splice(index, 1);
        localStorage.setItem(historyKey, JSON.stringify(records));
        showHistory(); // 刷新历史记录列表
      }
    }

    // 检测文本编码
    function detectEncoding(buffer) {
      const encodings = ['utf-8', 'gbk', 'gb2312', 'iso-8859-1', 'big5'];
      
      for (const encoding of encodings) {
        try {
          const decoder = new TextDecoder(encoding, { fatal: true });
          const text = decoder.decode(buffer);
          // 检查是否包含中文字符来判断是否是正确的编码
          if (/[\u4e00-\u9fff]/.test(text) || text.includes('题面') || text.includes('正确答案')) {
            return encoding;
          }
        } catch (e) {
          // 继续尝试下一个编码
        }
      }
      
      // 如果没有检测到，默认使用utf-8
      return 'utf-8';
    }

    // 解析CSV文本为题目数组
    function parseCSV(csvText, questionType, selectedSubject) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return [];
      
      // 保存对应题型的原始CSV数据
      originalCsvDataMap[questionType] = csvText;
      
      // 解析表头
      const headers = lines[0].split(',').map(h => h.trim());
      
      // 检查是否有科目列
      const hasSubjectColumn = headers.includes('科目');
      
      // 解析每一行数据
      const questions = [];
      
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        // 处理CSV中的引号和逗号
        const values = [];
        let inQuotes = false;
        let currentValue = '';
        
        for (let j = 0; j < line.length; j++) {
          const char = line[j];
          
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(currentValue.trim());
            currentValue = '';
          } else {
            currentValue += char;
          }
        }
        values.push(currentValue.trim()); // 添加最后一个值
        
        const question = {};
        
        // 设置题型
        question['题型'] = questionType;
        
        // 映射CSV字段到对象属性
        headers.forEach((header, index) => {
          if (index < values.length) {
            const value = values[index];
            switch(header) {
              case '题面':
                question['题目'] = value;
                break;
              case 'A':
              case 'B':
              case 'C':
              case 'D':
                question[header] = value;
                break;
              case '正确答案':
                question['答案'] = value;
                // 保存原始答案，用于后续导出
                question['originalAnswer'] = value;
                break;
              case '科目':
                question['科目'] = value;
                break;
              case '来源':
                question['来源'] = value;
                break;
              default:
                question[header] = value;
            }
          }
        });
        
        // 如果有科目列，检查是否匹配当前选择的科目
        if (hasSubjectColumn && question['科目'] && question['科目'] !== selectedSubject) {
          continue; // 跳过不匹配的科目
        }
        
        // 对于填空题和材料题，如果正确答案为空，则跳过该题及后续所有题目
        if ((questionType === '填空题' || questionType === '材料题') && !question['答案']) {
          break;
        }
        
        // 保存原始行索引，用于导出时准确匹配
        question['originalLineIndex'] = i;
        // 保存来自哪个题型，用于导出时查找对应的原始CSV数据
        question['csvType'] = questionType;
        questions.push(question);
      }
      return questions;
    }

    // 筛选符合条件的题目（随机排序）
    function filterQuestions(allQuestions, choiceCount, fillCount, materialCount) {
      const filtered = [];
      
      // 筛选选择题并随机排序
      const choiceQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '选择题'));
      const takeChoices = Math.min(choiceCount, choiceQuestions.length);
      filtered.push(...choiceQuestions.slice(0, takeChoices));
      
      // 筛选填空题并随机排序
      const fillQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '填空题'));
      const takeFills = Math.min(fillCount, fillQuestions.length);
      filtered.push(...fillQuestions.slice(0, takeFills));
      
      // 筛选材料题（解答题）并随机排序
      const materialQuestions = shuffleArray(allQuestions.filter(q => q['题型'] === '材料题'));
      const takeMaterials = Math.min(materialCount, materialQuestions.length);
      filtered.push(...materialQuestions.slice(0, takeMaterials));
      
      // 对所有选中的题目再次进行随机排序
      return shuffleArray(filtered);
    }

    // 开始做题设置
    async function startQuizSetup() {
      const subject = subjectSelect.value;
      const choiceCount = parseInt(choiceCountInput.value) || 0;
      const fillCount = parseInt(fillCountInput.value) || 0;
      const materialCount = parseInt(materialCountInput.value) || 0;

      // 验证输入
      if (choiceCount <= 0 && fillCount <= 0 && materialCount <= 0) {
        alert('请至少选择一种题型并设置数量');
        return;
      }

      // 获取当前科目的文件URL
      // const subjectFiles = subjectFileMap[subject];
      // if (!subjectFiles.choice || !subjectFiles.fill || !subjectFiles.material) {
      //   alert('请先在代码中填写当前科目的三个CSV文件URL');
      //   return;
      // }
      
      try {
        // 并行加载三个CSV文件
        const [choiceResponse, fillResponse, materialResponse] = await Promise.all([
          fetch(subjectFiles.choice),
          fetch(subjectFiles.fill),
          fetch(subjectFiles.material)
        ]);
        
        if (!choiceResponse.ok || !fillResponse.ok || !materialResponse.ok) {
          throw new Error('题目文件不存在');
        }
        
        // 获取ArrayBuffer
        const [choiceBuffer, fillBuffer, materialBuffer] = await Promise.all([
          choiceResponse.arrayBuffer(),
          fillResponse.arrayBuffer(),
          materialResponse.arrayBuffer()
        ]);
        
        // 自动检测编码并解码
        const choiceEncoding = detectEncoding(choiceBuffer);
        const fillEncoding = detectEncoding(fillBuffer);
        const materialEncoding = detectEncoding(materialBuffer);
        
        const decoder1 = new TextDecoder(choiceEncoding);
        const decoder2 = new TextDecoder(fillEncoding);
        const decoder3 = new TextDecoder(materialEncoding);
        
        const choiceText = decoder1.decode(choiceBuffer);
        const fillText = decoder2.decode(fillBuffer);
        const materialText = decoder3.decode(materialBuffer);
        
        // 解析三个CSV文件
        const choiceQuestions = parseCSV(choiceText, '选择题', subject);
        const fillQuestions = parseCSV(fillText, '填空题', subject);
        const materialQuestions = parseCSV(materialText, '材料题', subject);
        
        // 合并所有题目
        const allQuestions = [...choiceQuestions, ...fillQuestions, ...materialQuestions];
        
        if (allQuestions.length === 0) {
          alert('未解析到题目数据，请检查CSV格式和内容');
          return;
        }
        
        // 筛选出对应题型和数量的题目（随机）
        const filteredQuestions = filterQuestions(allQuestions, choiceCount, fillCount, materialCount);
        if (filteredQuestions.length === 0) {
          alert('没有足够的题目，请减少题目数量');
          return;
        }
        
        // 处理选择题的随机选项并更新正确答案
        filteredQuestions.forEach(question => {
          if (question['题型'] === '选择题') {
            const { options, newCorrectAnswer } = getRandomOptions(question);
            // 保存随机后的选项映射关系
            question['shuffledOptions'] = options;
            // 更新当前题目使用的正确答案（随机后的字母）
            question['displayAnswer'] = newCorrectAnswer;
          }
        });
        
        questions = filteredQuestions;
        userAnswers = new Array(questions.length).fill('');
        currentQuestionIndex = 0;
        secondsElapsed = 0;
        
        startQuiz();
      } catch (error) {
        console.error('加载题目出错:', error);
        alert('加载题目失败，请确保题目文件存在。错误信息：' + error.message);
      }
    }

    // 开始做题
    function startQuiz() {
      configPage.style.display = 'none';
      questionPage.style.display = 'block';
      currentSubjectSpan.textContent = subjectSelect.value;
      
      // 重置计时器
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);
      
      showQuestion();
      updateNavigationButtons();
    }

    // 显示当前题目
    function showQuestion() {
      if (currentQuestionIndex >= questions.length) return;
      
      const question = questions[currentQuestionIndex];
      progressSpan.textContent = `${currentQuestionIndex + 1}/${questions.length}`;
      questionContainer.innerHTML = '';
      
      // 题目类型标签
      const typeBadge = document.createElement('span');
      typeBadge.className = 'inline-block px-2 py-0.5 bg-gray-100 text-gray-800 text-xs font-medium rounded mb-3';
      typeBadge.textContent = question['题型'];
      questionContainer.appendChild(typeBadge);
      
      // 对于材料题，显示题面内容
      if (question['题型'] === '材料题') {
        // 材料题题面
        const materialTextContainer = document.createElement('div');
        materialTextContainer.className = 'text-base font-medium mb-4 p-4 bg-gray-50 rounded-lg border-l-4 border-primary';
        materialTextContainer.innerHTML = `<strong>材料：</strong>${textToHtml(question['题目'])}`;
        questionContainer.appendChild(materialTextContainer);
        
        // 材料题问题
        const questionTextContainer = document.createElement('div');
        questionTextContainer.className = 'text-lg font-medium mb-4 text-gray-800';
        questionTextContainer.innerHTML = `题目 ${currentQuestionIndex + 1}: ${textToHtml(question['问题'] || '请根据材料回答问题')}`;
        questionContainer.appendChild(questionTextContainer);
      } else {
        // 选择题和填空题直接显示题目
        const questionTextContainer = document.createElement('div');
        questionTextContainer.className = 'text-lg font-medium mb-4 text-gray-800';
        questionTextContainer.innerHTML = `题目 ${currentQuestionIndex + 1}: ${textToHtml(question['题目'])}`;
        questionContainer.appendChild(questionTextContainer);
      }
      
      // 选择题显示选项（支持文字+图片混合，且选项随机）
      if (question['题型'] === '选择题') {
        const choicesContainer = document.createElement('div');
        choicesContainer.className = 'space-y-3';
        
        // 使用随机排序后的选项
        question['shuffledOptions'].forEach((option, index) => {
          // 显示的选项字母（A、B、C、D）
          const displayLetter = String.fromCharCode(65 + index);
          
          const div = document.createElement('div');
          div.className = 'flex flex-col p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors';
          
          const radioContainer = document.createElement('div');
          radioContainer.className = 'flex items-center';
          
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = `question-${currentQuestionIndex}`;
          radio.value = displayLetter;
          radio.id = `q${currentQuestionIndex}-${displayLetter}`;
          radio.className = 'w-4 h-4 text-primary focus:ring-primary';
          if (userAnswers[currentQuestionIndex] === displayLetter) {
            radio.checked = true;
          }
          
          const label = document.createElement('label');
          label.htmlFor = `q${currentQuestionIndex}-${displayLetter}`;
          label.className = 'ml-3 text-gray-700 font-medium';
          label.textContent = displayLetter;
          
          radio.addEventListener('change', (e) => {
            userAnswers[currentQuestionIndex] = e.target.value;
          });
          
          radioContainer.appendChild(radio);
          radioContainer.appendChild(label);
          div.appendChild(radioContainer);
          
          // 选项内容（支持文字+图片混合）
          const choiceContent = document.createElement('div');
          choiceContent.className = 'ml-7 mt-2 text-gray-700';
          choiceContent.innerHTML = textToHtml(option.value);
          div.appendChild(choiceContent);
          
          choicesContainer.appendChild(div);
        });
        
        questionContainer.appendChild(choicesContainer);
      } else {
        // 填空题或材料题（支持文字+图片混合）
        const inputContainer = document.createElement('div');
        inputContainer.className = 'space-y-3';
        
        const input = document.createElement('textarea');
        input.className = 'w-full p-3 border border-gray-300 rounded-lg input-focus min-h-[100px] resize-y';
        input.placeholder = `请输入${question['题型']}答案`;
        input.value = userAnswers[currentQuestionIndex] || '';
        input.addEventListener('input', (e) => {
          userAnswers[currentQuestionIndex] = e.target.value;
        });
        
        inputContainer.appendChild(input);
        questionContainer.appendChild(inputContainer);
      }
    }

    // 更新计时器
    function updateTimer() {
      secondsElapsed++;
      const minutes = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
      const seconds = (secondsElapsed % 60).toString().padStart(2, '0');
      timerSpan.textContent = `${minutes}:${seconds}`;
      
      // 超过10分钟添加警告样式
      if (secondsElapsed > 600) {
        timerSpan.classList.add('text-warning', 'font-bold');
      } else {
        timerSpan.classList.remove('text-warning', 'font-bold');
      }
    }

    // 上一题
    function goToPrevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        showQuestion();
        updateNavigationButtons();
      }
    }

    // 下一题
    function goToNextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        showQuestion();
        updateNavigationButtons();
      }
    }

    // 更新导航按钮状态
    function updateNavigationButtons() {
      prevBtn.style.display = currentQuestionIndex > 0 ? 'block' : 'none';
      
      if (currentQuestionIndex === questions.length - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'block';
      } else {
        nextBtn.style.display = 'block';
        submitBtn.style.display = 'none';
      }
    }

    // 提交答案
    function submitAnswers() {
      clearInterval(timerInterval);
      showResults();
    }

    // 显示结果（支持文字+图片混合）
    function showResults() {
      resultContent.innerHTML = '';
      let correctCount = 0;
      
      questions.forEach((question, index) => {
        const userAnswer = userAnswers[index] || '';
        let isCorrect = false;
        let correctAnswerDisplay = '';
        
        if (question['题型'] === '选择题') {
          // 选择题使用随机后的答案进行判断
          isCorrect = userAnswer === question['displayAnswer'];
          // 显示正确答案字母和对应的选项内容
          const correctOption = question['shuffledOptions'].find((_, i) => 
            String.fromCharCode(65 + i) === question['displayAnswer']
          );
          correctAnswerDisplay = `${question['displayAnswer']}: ${textToHtml(correctOption ? correctOption.value : '')}`;
        } else {
          // 填空题和材料题不判断对错，只显示答案
          isCorrect = true; // 填空题和材料题不计入正确计数
          correctAnswerDisplay = textToHtml(question['答案']);
        }
        
        if (isCorrect && question['题型'] === '选择题') correctCount++;
        
        const resultItem = document.createElement('div');
        resultItem.className = `p-3 rounded-lg ${isCorrect ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'}`;
        
        // 填空题和材料题不显示对错标记
        const showCorrectness = question['题型'] === '选择题';
        
        resultItem.innerHTML = `
          <div class="font-medium mb-1">题目 ${index + 1} (${question['题型']})</div>
          <div class="text-sm text-gray-600 mb-1">${textToHtml(question['题型'] === '材料题' ? (question['题目'] + ' ' + (question['问题'] || '')) : question['题目'])}</div>
          <div class="text-sm"><span class="text-gray-600">你的答案：</span>${textToHtml(userAnswer || '未作答')}</div>
          <div class="text-sm"><span class="text-gray-600">正确答案：</span>${correctAnswerDisplay}</div>
          ${showCorrectness ? `<div class="text-sm font-medium mt-1 ${isCorrect ? 'text-green-600' : 'text-red-600'}">
            ${isCorrect ? '正确' : '错误'}
          </div>` : ''}
        `;
        
        resultContent.appendChild(resultItem);
      });
      
      // 添加总分（只计算选择题）
      const scoreItem = document.createElement('div');
      scoreItem.className = 'p-3 bg-primary/5 rounded-lg text-center mt-4';
      scoreItem.innerHTML = `
        <div class="text-lg font-bold text-primary">
          总得分：${correctCount}/${questions.filter(q => q['题型'] === '选择题').length}
        </div>
        <div class="text-sm text-gray-600">正确率：${questions.filter(q => q['题型'] === '选择题').length > 0 ? ((correctCount/questions.filter(q => q['题型'] === '选择题').length)*100).toFixed(1) : '0'}%</div>
        <div class="text-sm text-gray-600">用时：${timerSpan.textContent}</div>
        <div class="text-sm text-gray-600 mt-1">注：填空题和材料题不计分</div>
      `;
      resultContent.prepend(scoreItem);
      
      // 保存到历史记录
      saveHistory(correctCount);
      
      // 显示结果弹窗
      resultModal.style.display = 'flex';
    }

    // 保存历史记录到localStorage
    function saveHistory(correctCount) {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      
      // 构建历史记录对象
      const historyRecord = {
        date: new Date().toLocaleString(),
        subject: subject,
        total: questions.length,
        correct: correctCount,
        accuracy: questions.filter(q => q['题型'] === '选择题').length > 0 ? ((correctCount/questions.filter(q => q['题型'] === '选择题').length)*100).toFixed(1) + '%' : '0%',
        time: timerSpan.textContent,
        // 保存题目原始数据
        originalQuestions: questions.map(q => ({
          ...q,
          shuffledOptions: q['shuffledOptions'] ? [...q['shuffledOptions']] : undefined,
          csvType: q['csvType'],
          originalLineIndex: q['originalLineIndex']
        })),
        userAnswers: [...userAnswers],
        // 保存原始CSV数据引用
        csvData: {
          '选择题': originalCsvDataMap['选择题'],
          '填空题': originalCsvDataMap['填空题'],
          '材料题': originalCsvDataMap['材料题']
        }
      };
      
      // 从localStorage获取已有记录
      const existingRecords = JSON.parse(localStorage.getItem(historyKey) || '[]');
      existingRecords.push(historyRecord);
      
      // 保存回localStorage
      localStorage.setItem(historyKey, JSON.stringify(existingRecords));
    }

    // 显示历史记录
    function showHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      historyList.innerHTML = '';
      
      if (records.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'text-center py-6 text-neutral';
        emptyMsg.textContent = '暂无该科目的做题记录';
        historyList.appendChild(emptyMsg);
      } else {
        // 倒序显示，最新的在前面
        records.slice().reverse().forEach((record, i) => {
          const originalIndex = records.length - 1 - i;
          const recordItem = document.createElement('div');
          recordItem.className = 'p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors';
          
          recordItem.innerHTML = `
            <div class="flex justify-between items-start mb-2">
              <div class="font-medium">${record.date}</div>
              <div class="flex gap-2">
                <button class="export-single-history text-primary text-sm" data-index="${originalIndex}">
                  <i class="fa fa-download mr-1"></i>导出
                </button>
                <button class="delete-history text-danger text-sm" data-index="${originalIndex}">
                  <i class="fa fa-trash mr-1"></i>删除
                </button>
              </div>
            </div>
            <div class="text-sm text-gray-600 space-y-1">
              <div>得分：${record.correct}/${record.originalQuestions.filter(q => q['题型'] === '选择题').length}（${record.accuracy}）</div>
              <div>用时：${record.time}</div>
              <div class="text-xs text-gray-500">注：填空题和材料题不计分</div>
            </div>
          `;
          
          historyList.appendChild(recordItem);
        });
        
        // 为单个记录导出按钮添加事件
        document.querySelectorAll('.export-single-history').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = parseInt(e.target.closest('.export-single-history').dataset.index);
            exportSingleHistory(records[index]);
          });
        });
        
        // 为单个记录删除按钮添加事件
        document.querySelectorAll('.delete-history').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const index = parseInt(e.target.closest('.delete-history').dataset.index);
            deleteHistoryRecord(index);
          });
        });
      }
      
      historyModal.style.display = 'flex';
    }

    // 处理CSV字段中的特殊字符
    function escapeCsvField(field) {
      if (!field) return '';
      // 如果包含逗号、引号或换行符，则需要用引号包裹
      if (field.includes(',') || field.includes('"') || field.includes('\n')) {
        // 替换引号为两个引号
        return `"${field.replace(/"/g, '""')}"`;
      }
      return field;
    }

    // 导出当前结果为CSV（在原始CSV基础上添加用户答案和时间）
    function exportCurrentResult() {
      const subject = subjectSelect.value;
      const timeUsed = timerSpan.textContent;
      
      // 分别处理三种题型的CSV数据
      const resultLines = [];
      
      // 添加表头（基于选择题的CSV表头）
      const choiceCsvLines = originalCsvDataMap['选择题'].trim().split('\n');
      if (choiceCsvLines.length > 0) {
        resultLines.push(choiceCsvLines[0] + ',用户答案,用时,是否正确,题型');
      }
      
      // 处理每道题
      questions.forEach((question, index) => {
        const csvType = question['csvType'];
        const originalLineIndex = question['originalLineIndex'];
        const csvLines = originalCsvDataMap[csvType].trim().split('\n');
        
        if (originalLineIndex < csvLines.length) {
          const originalLine = csvLines[originalLineIndex];
          let userAnswer = userAnswers[index] || '未作答';
          let isCorrect = '未判断';
          
          // 对于选择题，需要记录原始答案和用户选择的原始选项
          if (question['题型'] === '选择题') {
            const correct = userAnswer === question['displayAnswer'];
            isCorrect = correct ? '正确' : '错误';
            
            // 找到用户答案对应的原始选项字母
            const userOptionIndex = question['shuffledOptions'].findIndex((_, i) => 
              String.fromCharCode(65 + i) === userAnswer
            );
            if (userOptionIndex !== -1) {
              userAnswer = `${userAnswer}(${question['shuffledOptions'][userOptionIndex].key})`;
            }
          }
          
          // 转义特殊字符
          const escapedUserAnswer = escapeCsvField(userAnswer);
          const escapedTimeUsed = escapeCsvField(timeUsed);
          const escapedIsCorrect = escapeCsvField(isCorrect);
          const escapedQuestionType = escapeCsvField(question['题型']);
          
          resultLines.push(`${originalLine},${escapedUserAnswer},${escapedTimeUsed},${escapedIsCorrect},${escapedQuestionType}`);
        }
      });
      
      const csvContent = resultLines.join('\n');
      
      // 创建下载链接
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      
      // 处理文件名中的特殊字符
      const safeDate = new Date().toLocaleDateString().replace(/\//g, '-');
      const safeTime = new Date().toLocaleTimeString().replace(/:/g, '-');
      a.setAttribute('download', `${subject}_做题结果_${safeDate}_${safeTime}.csv`);
      
      a.style.visibility = 'hidden';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 导出单条历史记录
    function exportSingleHistory(record) {
      const timeUsed = record.time;
      
      // 分别处理三种题型的CSV数据
      const resultLines = [];
      
      // 添加表头（基于选择题的CSV表头）
      const choiceCsvLines = record.csvData['选择题'].trim().split('\n');
      if (choiceCsvLines.length > 0) {
        resultLines.push(choiceCsvLines[0] + ',用户答案,用时,是否正确,题型,记录日期');
      }
      
      // 处理每道题
      record.originalQuestions.forEach((question, index) => {
        const csvType = question['csvType'];
        const originalLineIndex = question['originalLineIndex'];
        const csvLines = record.csvData[csvType].trim().split('\n');
        
        if (originalLineIndex < csvLines.length) {
          const originalLine = csvLines[originalLineIndex];
          let userAnswer = record.userAnswers[index] || '未作答';
          let isCorrect = '未判断';
          
          // 对于选择题，需要记录原始答案和用户选择的原始选项
          if (question['题型'] === '选择题') {
            const correct = userAnswer === question['displayAnswer'];
            isCorrect = correct ? '正确' : '错误';
            
            // 找到用户答案对应的原始选项字母
            const userOptionIndex = question['shuffledOptions'].findIndex((_, i) => 
              String.fromCharCode(65 + i) === userAnswer
            );
            if (userOptionIndex !== -1) {
              userAnswer = `${userAnswer}(${question['shuffledOptions'][userOptionIndex].key})`;
            }
          }
          
          // 转义特殊字符
          const escapedUserAnswer = escapeCsvField(userAnswer);
          const escapedTimeUsed = escapeCsvField(timeUsed);
          const escapedIsCorrect = escapeCsvField(isCorrect);
          const escapedQuestionType = escapeCsvField(question['题型']);
          const escapedDate = escapeCsvField(record.date);
          
          resultLines.push(`${originalLine},${escapedUserAnswer},${escapedTimeUsed},${escapedIsCorrect},${escapedQuestionType},${escapedDate}`);
        }
      });
      
      const csvContent = resultLines.join('\n');
      return csvContent;
    }

    // 导出所有历史记录（包含所有题目）
    function exportAllHistory() {
      const subject = subjectSelect.value;
      const historyKey = subjectHistoryMap[subject];
      const records = JSON.parse(localStorage.getItem(historyKey) || '[]');
      
      if (records.length === 0) {
        alert('暂无历史记录可导出');
        return;
      }
      
      // 用于存储所有记录的CSV内容
      let allCsvContent = '';
      let isFirstRecord = true;
      
      // 逐个处理每条记录
      records.forEach((record, recordIndex) => {
        // 获取单条记录的CSV内容
        const recordCsv = exportSingleHistory(record);
        const lines = recordCsv.split('\n');
        
        if (lines.length === 0) return;
        
        // 对于第一条记录，保留表头
        if (isFirstRecord) {
          allCsvContent += lines.join('\n') + '\n';
          isFirstRecord = false;
        } else {
          // 对于后续记录，跳过表头
          if (lines.length > 1) {
            allCsvContent += lines.slice(1).join('\n') + '\n';
          }
        }
      });
      
      // 创建下载链接
      const blob = new Blob([allCsvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.setAttribute('href', url);
      
      // 处理文件名中的特殊字符
      const safeDate = new Date().toLocaleDateString().replace(/\//g, '-');
      const safeTime = new Date().toLocaleTimeString().replace(/:/g, '-');
      a.setAttribute('download', `${subject}_所有做题记录_${safeDate}_${safeTime}.csv`);
      
      a.style.visibility = 'hidden';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 返回配置页面
    function returnToConfig() {
      resultModal.style.display = 'none';
      questionPage.style.display = 'none';
      configPage.style.display = 'block';
      clearInterval(timerInterval);
    }

    // 初始化
    initEventListeners();
  </script>
</body>

</html>
